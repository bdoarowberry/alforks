<!DOCTYPE html>
<html lang="en">
<head>
  {% include '_head.html' %}
  <title>AlForks – Heat Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link rel="stylesheet" href="/static/base.css?v={{ asset_v('base.css') }}">
  <script src="/static/utils.js?v={{ asset_v('utils.js') }}"></script>
  <script src="/static/sync_toast.js?v={{ asset_v('sync_toast.js') }}" defer></script>
  <script src="/static/review_nav.js?v={{ asset_v('review_nav.js') }}" defer></script>
  <style>
    /* Style tokens come from /static/base.css. Surface treatments mirror
       Summary: bg-card panels with hair borders, mono numerics, and
       eyebrow labels at 10px / 0.14em letter-spacing. */
    body { height: 100vh; display: flex; flex-direction: column; }

    /* ── Page header strip ──────────────────────────────────────────── */
    /* Title and mode segmented control stack vertically, both left-aligned.
       The view choice reads as a sub-control of the page, sitting between
       the title above and the data filters below. */
    #page-head { padding: 18px 24px 10px; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
    #page-head h1 { font-size: 1.4rem; font-weight: 500; color: var(--text-primary); letter-spacing: -0.02em; margin: 0; }

    /* ── Filter bar ─────────────────────────────────────────────────── */
    #filter-bar { background: var(--bg-card); border-bottom: 1px solid var(--border-hair); padding: 10px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; flex-wrap: wrap; }
    #filter-bar label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.14em; font-family: var(--font-mono); }
    .sep { width: 1px; height: 18px; background: var(--border-hair); flex-shrink: 0; }

    /* Inline hint shown next to the Year label when Recency mode locks
       the year filter to "All". */
    #year-lock-hint { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.04em; text-transform: none; margin-left: 6px; font-style: italic; }

    /* Filter chips inherit the canonical .filter-btn from base.css.
       Year filter locked (Recency mode) — non-"All" chips are disabled
       so the user can see the full set but knows only "All" is selectable. */
    #year-filters.locked .filter-btn:not(.active) { opacity: 0.3; pointer-events: none; }

    /* Heat / Routes / Recency segmented control. Lives in #page-head
       above the data filters now — see #page-head comment. */
    #mode-group { display: inline-flex; background: rgba(255,255,255,0.04); border: 1px solid var(--border-hair); border-radius: 4px; overflow: hidden; }
    .mode-btn { font-size: 11px; padding: 5px 12px; border: none; background: transparent; color: rgba(255,255,255,0.55); cursor: pointer; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.12s, background 0.12s; }
    .mode-btn + .mode-btn { border-left: 1px solid var(--border-hair); }
    .mode-btn:hover:not(.active):not(:disabled) { color: var(--text-secondary); }
    .mode-btn.active { background: rgba(255,255,255,0.10); color: var(--text-primary); }
    .mode-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Map area ───────────────────────────────────────────────────── */
    #map-wrap { flex: 1; position: relative; min-height: 0; display: flex; flex-direction: column; }
    #map { flex: 1; min-height: 0; }
    #map-3d { position: absolute; inset: 0; display: none; }

    /* Top-right cluster: basemap segmented control + fullscreen button. */
    #view-controls { position: absolute; top: 10px; right: 10px; z-index: 1000; display: flex; gap: 6px; }
    #view-toggle { display: flex; background: rgba(15,19,19,0.88); border: 1px solid var(--border-hair); border-radius: 4px; overflow: hidden; backdrop-filter: blur(6px); }
    .vtbtn { padding: 5px 12px; background: transparent; color: rgba(255,255,255,0.55); border: none; border-right: 1px solid var(--border-hair); cursor: pointer; font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.12s, background 0.12s; }
    .vtbtn:last-child { border-right: none; }
    .vtbtn:hover:not(.active):not(:disabled) { color: var(--text-secondary); }
    .vtbtn.active { background: rgba(255,255,255,0.10); color: var(--text-primary); }
    .vtbtn:disabled { opacity: 0.35; cursor: default; }

    /* Standalone fullscreen toggle — single icon button, same surface
       treatment as the segmented control next to it. */
    #fs-btn { padding: 4px 10px; background: rgba(15,19,19,0.88); color: rgba(255,255,255,0.55); border: 1px solid var(--border-hair); border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1; backdrop-filter: blur(6px); transition: color 0.12s, background 0.12s; font-family: var(--font-mono); }
    #fs-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.10); }
    #fs-btn.active { color: var(--text-primary); background: rgba(255,255,255,0.10); }

    /* Floating overlays share the same surface — translucent bg-card,
       hair border, square-ish 4px radius, blurred backdrop. */
    .map-panel { background: rgba(15,19,19,0.88); border: 1px solid var(--border-hair); border-radius: 4px; backdrop-filter: blur(6px); }
    .panel-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); font-family: var(--font-mono); }

    /* Stats overlay */
    #stats-overlay { position: absolute; bottom: 30px; left: 10px; z-index: 1000; padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; min-width: 180px; }
    .ov-stat { display: flex; justify-content: space-between; align-items: baseline; gap: 18px; }
    .ov-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); font-family: var(--font-mono); }
    .ov-value { font-size: 14px; font-weight: 500; color: var(--text-primary); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    /* Type / Recency legend — min-width sized so the 4-up Recency preset
       row (Tight / Seasonal / Long / Yearly) fits without wrapping. */
    #legend { position: absolute; bottom: 30px; right: 10px; z-index: 1000; padding: 12px 16px; font-size: 11px; display: none; color: var(--text-secondary); font-family: var(--font-mono); min-width: 240px; }
    #legend.visible { display: block; }
    .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .leg-row:last-child { margin-bottom: 0; }
    .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* Recency preset selector — segmented control inside the legend. */
    .leg-presets { display: flex; margin: 7px 0 9px; background: rgba(255,255,255,0.04); border: 1px solid var(--border-hair); border-radius: 3px; overflow: hidden; }
    .leg-preset-btn { flex: 1; padding: 4px 6px; font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.55); background: transparent; border: none; cursor: pointer; transition: color 0.12s, background 0.12s; }
    .leg-preset-btn + .leg-preset-btn { border-left: 1px solid var(--border-hair); }
    .leg-preset-btn:hover:not(.active) { color: var(--text-secondary); }
    .leg-preset-btn.active { color: var(--text-primary); background: rgba(255,255,255,0.10); }

    /* Heat gradient legend */
    #heat-legend { position: absolute; bottom: 30px; right: 10px; z-index: 1000; padding: 12px 16px; display: none; }
    #heat-legend.visible { display: block; }
    #heat-legend .grad-bar { width: 130px; height: 8px; border-radius: 2px; background: linear-gradient(to right, #1e40af, #06b6d4, #facc15, #ef4444); margin: 7px 0 4px; }
    #heat-legend .grad-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.04em; text-transform: uppercase; }

    /* 3D terrain exaggeration control */
    #exag-ctrl-3d { display: none; position: absolute; bottom: 36px; left: 10px; z-index: 1000; padding: 9px 14px; align-items: center; gap: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); font-family: var(--font-mono); }
    #exag-ctrl-3d input { accent-color: var(--accent); width: 90px; }
    #exag-val-3d { min-width: 32px; color: var(--text-secondary); letter-spacing: 0; text-transform: none; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    /* Mapbox overrides */
    .mapboxgl-ctrl-group { background: rgba(15,19,19,0.9) !important; border: 1px solid var(--border-hair) !important; }
    .mapboxgl-ctrl button { background-color: transparent !important; }
    .mapboxgl-ctrl button .mapboxgl-ctrl-icon { filter: invert(0.7); }
    .mapboxgl-ctrl-attrib { background: rgba(15,19,19,0.7) !important; color: var(--text-muted) !important; font-size: 10px; font-family: var(--font-mono); }
    .mapboxgl-ctrl-attrib a { color: var(--text-muted) !important; }

    /* Leaflet 2D control chrome (zoom bar + rotate compass) — match the dark
       site surface, mirroring the index mini-map controls. The compass arrow
       is a two-tone (#333/#ccc) inline-SVG background, so invert() keeps it
       visible on the dark button. */
    .leaflet-bar { border: 1px solid var(--border-row); box-shadow: none; border-radius: 4px; overflow: hidden; }
    .leaflet-bar a, .leaflet-bar a:hover { background-color: rgba(15,19,19,0.92); color: var(--text-secondary); border-bottom-color: var(--border-row); }
    .leaflet-bar a:hover { background-color: rgba(255,255,255,0.05); color: #fff; }
    .leaflet-control-rotate-arrow { filter: invert(1); }

    /* Loading overlay */
    #loading { position: absolute; inset: 0; z-index: 2000; background: rgba(10,12,12,0.78); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; backdrop-filter: blur(4px); }
    #loading.hidden { display: none; }
    #loading-text { font-size: 12px; color: var(--text-tertiary); font-family: var(--font-mono); letter-spacing: 0.04em; }
    #loading-bar-wrap { width: 240px; height: 3px; background: var(--border-hair); border-radius: 2px; overflow: hidden; }
    #loading-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.15s; }
  </style>
</head>
<body>

<header>
  <h1>AlForks</h1>
  <nav>
    <a href="/">Summary</a>
    <a href="/logs">Logs</a>
    <a href="/heatmap" class="active">Heat Map</a>
    <a href="/training">Training</a>
    <a href="/trails">Trails</a>
    <a href="/review">Review<span id="nav-review-badge" class="nav-pill" style="display:none;">0</span></a>
    <a href="/setup">Setup</a>
  </nav>
  <button class="nav-sync-btn" onclick="triggerSyncAll()" title="Sync Strava + Garmin now">Sync</button>
</header>

<div id="page-head">
  <h1>Heat Map</h1>
  <div id="mode-group">
    <button class="mode-btn"        id="btn-heat"    onclick="setMode('heat')">Heat</button>
    <button class="mode-btn active" id="btn-routes"  onclick="setMode('routes')">Routes</button>
    <button class="mode-btn"        id="btn-recency" onclick="setMode('recency')">Recency</button>
  </div>
</div>

<div id="filter-bar">
  <label>Year<span id="year-lock-hint" style="display:none">all-time only</span></label>
  <div id="year-filters" style="display:flex;gap:6px;"></div>
  <div class="sep"></div>
  <label>Type</label>
  <div id="type-filters" style="display:flex;gap:6px;"></div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="map-3d"></div>

  <div id="view-controls">
    <div id="view-toggle">
      <button class="vtbtn active" id="vt-map"       onclick="setMapView('map')">Map</button>
      <button class="vtbtn"        id="vt-satellite" onclick="setMapView('satellite')">Satellite</button>
      <button class="vtbtn"        id="vt-3d"        onclick="setMapView('3d')"{% if not mapbox_token %} disabled title="No Mapbox token configured"{% endif %}>3D</button>
    </div>
    <button id="fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen (Esc to exit)" aria-label="Toggle fullscreen">⛶</button>
  </div>

  <div id="stats-overlay" class="map-panel">
    <div class="ov-stat"><span class="ov-label">Logs</span><span class="ov-value" id="ov-count">--</span></div>
    <div class="ov-stat"><span class="ov-label">Total Distance</span><span class="ov-value" id="ov-dist">--</span></div>
    <div class="ov-stat"><span class="ov-label">Rides</span><span class="ov-value" id="ov-rides">--</span></div>
  </div>

  <div id="heat-legend" class="map-panel">
    <div class="panel-eyebrow">Density</div>
    <div class="grad-bar"></div>
    <div class="grad-labels"><span>Low</span><span>High</span></div>
  </div>

  <div id="legend" class="map-panel">
    <div class="panel-eyebrow" style="margin-bottom:7px;">Activity Type</div>
    <div id="legend-rows"></div>
  </div>

  <div id="exag-ctrl-3d" class="map-panel">
    Terrain
    <input type="range" id="exaggeration-3d" min="1" max="4" step="0.1" value="1.5"
      oninput="onExag3DChange(this.value)">
    <span id="exag-val-3d">1.5×</span>
  </div>

  <div id="loading">
    <div id="loading-text">Connecting…</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>
</div>

<script>
const TYPES = {{ types_json | safe }};
const TYPE_LABELS = Object.fromEntries(TYPES.map(t => [t.id, t.label]));
const TYPE_COLORS = Object.fromEntries(TYPES.map(t => [t.id, t.color]));
const UNTAGGED_COLOR = '#3b82f6';
const MAPBOX_TOKEN   = '{{ mapbox_token }}';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let allActivities = [];
let activeYear = 'all';
let activeTypes = new Set();   // empty Set = "All" (no type filter)
// Two independent axes:
//   viewMode: 'heat' | 'routes' | 'recency' — what we paint
//   mapView:  'map'  | 'satellite' | '3d'   — basemap / canvas
// 3D respects viewMode now: routes/recency render as Mapbox lines, heat as
// a Mapbox heatmap layer.
let viewMode = 'routes';
let mapView  = 'map';

// Auto-fit gates: do the initial fit-to-most-recent once, and stop auto-fitting
// the moment the user pans/zooms so filter/mode/view toggles don't snap them
// away from the area they're inspecting. mb3dFitDone is the 3D-canvas
// equivalent — set after the first fit so mode changes don't snap the
// 3D camera around either.
let userInteracted = false;
let initialFitDone = false;
let mb3dFitDone    = false;

// ─── Leaflet map ──────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true, preferCanvas: true, rotate: true, touchRotate: true, zoomSnap: 0.25 }).setView([51, -114], 11);
map.addControl(new L.Control.Rotate({ closeOnZeroBearing: false }));

// Any user-driven pan/zoom locks out further auto-fits. Programmatic fits
// (fitBounds from autoFit) fire 'movestart' too — guard against that by
// gating on the event's originalEvent presence (Leaflet sets it for user
// gestures but not for programmatic moves).
map.on('dragstart', () => { userInteracted = true; });
map.on('zoomstart', (e) => { if (e.originalEvent) userInteracted = true; });

const streetLayer = makeStreetLayer();
const satelliteLayer = makeSatelliteLayer();
streetLayer.addTo(map);

let heatLayer  = null;
let routeGroup = L.layerGroup().addTo(map);

// ─── Mapbox 3D ────────────────────────────────────────────────────────────────
let mb3d = null, mb3dReady = false;

function init3D() {
  if (mb3d) { mb3d.resize(); return; }
  if (!MAPBOX_TOKEN) return;
  mb3d = createTerrain3DMap('map-3d', MAPBOX_TOKEN, () => {
    // Routes/Recency lines — colour comes from feature properties so the
    // same layer can render either type-coloured or recency-coloured lines.
    mb3d.addSource('routes3d', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    mb3d.addLayer({ id: 'routes3d-layer', type: 'line', source: 'routes3d',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': ['get', 'color'], 'line-width': 2.5, 'line-opacity': 0.8 },
    });

    // Heat density — separate point source + heatmap layer. Hidden by
    // default; toggled by update3DLayers when viewMode === 'heat'. Colour
    // ramp matches the 2D Leaflet.heat gradient so the two views read
    // consistently.
    mb3d.addSource('heat3d', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    mb3d.addLayer({ id: 'heat3d-layer', type: 'heatmap', source: 'heat3d', maxzoom: 17,
      layout: { visibility: 'none' },
      paint: {
        'heatmap-weight':    1,
        'heatmap-intensity': ['interpolate', ['linear'], ['zoom'], 0, 1, 17, 3],
        'heatmap-color': [
          'interpolate', ['linear'], ['heatmap-density'],
          0,    'rgba(30,64,175,0)',
          0.2,  '#1e40af',
          0.45, '#06b6d4',
          0.7,  '#facc15',
          1.0,  '#ef4444',
        ],
        'heatmap-radius':  ['interpolate', ['linear'], ['zoom'], 0, 4, 11, 10, 14, 18, 17, 28],
        'heatmap-opacity': 0.85,
      },
    });

    mb3dReady = true;
    update3DLayers();
    fit3DToMostRecent();
  });
}

function mostRecentActivity() {
  return allActivities.reduce((best, a) =>
    (a.date && (!best || a.date > best.date)) ? a : best, null);
}

function build3DRoutesGeoJSON() {
  // In Recency mode draw oldest-first so recent rides paint over old ones
  // at overlapping trails — same "max-recency" reduction as 2D.
  const useRecency = viewMode === 'recency';
  const today  = Date.now();
  const DAY_MS = 24 * 60 * 60 * 1000;
  const acts = useRecency
    ? [...allActivities].filter(a => a.date && a.polyline?.length)
                        .sort((a, b) => a.date.localeCompare(b.date))
    : allActivities;

  return {
    type: 'FeatureCollection',
    features: acts.map(act => {
      let color;
      if (useRecency) {
        const days = (today - new Date(act.date).getTime()) / DAY_MS;
        color = bucketForDays(days).color;
      } else {
        color = TYPE_COLORS[act.type] || UNTAGGED_COLOR;
      }
      return {
        type: 'Feature',
        properties: { color },
        geometry: { type: 'LineString', coordinates: act.polyline.map(([lat, lon]) => [lon, lat]) },
      };
    }),
  };
}

function build3DHeatGeoJSON() {
  // Same per-track downsample as the 2D heat path — see HEAT_TARGET_POINTS
  // — so densely sampled tracks don't drown out shorter ones.
  const features = [];
  for (const act of allActivities) {
    const n = act.polyline?.length || 0;
    if (!n) continue;
    const stride = Math.max(1, Math.ceil(n / HEAT_TARGET_POINTS));
    for (let i = 0; i < n; i += stride) {
      const [lat, lon] = act.polyline[i];
      features.push({ type: 'Feature', properties: {}, geometry: { type: 'Point', coordinates: [lon, lat] } });
    }
  }
  return { type: 'FeatureCollection', features };
}

function update3DLayers() {
  if (!mb3d || !mb3dReady) return;
  if (viewMode === 'heat') {
    mb3d.getSource('heat3d')?.setData(build3DHeatGeoJSON());
    mb3d.setLayoutProperty('heat3d-layer',   'visibility', 'visible');
    mb3d.setLayoutProperty('routes3d-layer', 'visibility', 'none');
  } else {
    mb3d.getSource('routes3d')?.setData(build3DRoutesGeoJSON());
    mb3d.setLayoutProperty('routes3d-layer', 'visibility', 'visible');
    mb3d.setLayoutProperty('heat3d-layer',   'visibility', 'none');
  }
}

function fit3DToMostRecent() {
  if (!mb3d || !mb3dReady || mb3dFitDone) return;
  const recent = mostRecentActivity();
  if (!recent?.polyline?.length) return;
  const lats = recent.polyline.map(([lat]) => lat);
  const lons = recent.polyline.map(([, lon]) => lon);
  mb3d.fitBounds(
    [[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]],
    { padding: 80, pitch: 55, bearing: -15, duration: 1000 }
  );
  mb3dFitDone = true;
}

function onExag3DChange(v) {
  document.getElementById('exag-val-3d').textContent = `${parseFloat(v).toFixed(1)}×`;
  if (mb3d?.getTerrain()) mb3d.setTerrain({ source: 'mapbox-dem', exaggeration: parseFloat(v) });
}

// ─── Render ──────────────────────────────────────────────────────────────────
// Cap each track's contribution to ~HEAT_TARGET_POINTS so a 16k-point ride
// doesn't drown out a 600-point one in heat density. Backend already strides
// every 5th sample; this is a second pass to normalize across tracks.
const HEAT_TARGET_POINTS = 500;

function buildHeatPoints() {
  const out = [];
  for (const act of allActivities) {
    const n = act.polyline?.length || 0;
    if (!n) continue;
    const stride = Math.max(1, Math.ceil(n / HEAT_TARGET_POINTS));
    for (let i = 0; i < n; i += stride) {
      const [lat, lon] = act.polyline[i];
      out.push([lat, lon, 1]);
    }
  }
  return out;
}

function renderHeat() {
  routeGroup.clearLayers();
  if (heatLayer) { heatLayer.remove(); heatLayer = null; }
  const pts = buildHeatPoints();
  if (pts.length) {
    const { radius, blur } = heatParamsForZoom(map.getZoom());
    heatLayer = L.heatLayer(pts, {
      radius, blur, maxZoom: 17, max: 1.0, minOpacity: 0.2,
      gradient: { 0.2: '#1e40af', 0.45: '#06b6d4', 0.7: '#facc15', 1.0: '#ef4444' },
    }).addTo(map);
  }
  updateRouteLegend();
}

map.on('zoomend', () => {
  if (!heatLayer || viewMode !== 'heat' || mapView === '3d') return;
  const { radius, blur } = heatParamsForZoom(map.getZoom());
  heatLayer.setOptions({ radius, blur });
});

function addRouteLayer(act) {
  const color = TYPE_COLORS[act.type] || UNTAGGED_COLOR;
  L.polyline(act.polyline, { color, weight: 5, opacity: 0.12, interactive: false }).addTo(routeGroup);
  L.polyline(act.polyline, { color, weight: 2, opacity: 0.65, interactive: false }).addTo(routeGroup);
}

function renderRoutes() {
  if (heatLayer) { heatLayer.remove(); heatLayer = null; }
  routeGroup.clearLayers();
  allActivities.forEach(addRouteLayer);
  updateRouteLegend();
}

// ─── Recency mode ─────────────────────────────────────────────────────────────
// Each track is coloured by how long ago it was ridden. Tracks are drawn
// oldest-first so the most recent ride wins at any overlap — meaning red
// areas truly are "haven't been here in years", not just "rode once long ago
// then again last week". Year filter is locked to "All" by setMode().
//
// Three bucket presets are offered so the same map can be read with different
// tolerance for seasonal gaps — Canadian winters mean a summer trail ridden
// last September shouldn't get flagged as stale until we've actually skipped
// an active season.
const RECENCY_PRESETS = {
  tight: {
    label: 'Tight',
    hint:  'Year-round',
    buckets: [
      { maxDays: 30,       color: '#3b82f6', label: '≤ 1 month'    },
      { maxDays: 90,       color: '#06b6d4', label: '1–3 months'   },
      { maxDays: 365,      color: '#facc15', label: '3–12 months'  },
      { maxDays: 730,      color: '#f97316', label: '1–2 years'    },
      { maxDays: Infinity, color: '#ef4444', label: '2+ years'     },
    ],
  },
  seasonal: {
    label: 'Seasonal',
    hint:  '1 off-season',
    buckets: [
      { maxDays: 30,       color: '#3b82f6', label: '≤ 1 month'    },
      { maxDays: 180,      color: '#06b6d4', label: '1–6 months'   },
      { maxDays: 420,      color: '#facc15', label: '6–14 months'  },
      { maxDays: 910,      color: '#f97316', label: '14–30 months' },
      { maxDays: Infinity, color: '#ef4444', label: '30+ months'   },
    ],
  },
  long: {
    label: 'Long',
    hint:  'Snow / hike only',
    buckets: [
      { maxDays: 30,       color: '#3b82f6', label: '≤ 1 month'    },
      { maxDays: 240,      color: '#06b6d4', label: '1–8 months'   },
      { maxDays: 540,      color: '#facc15', label: '8–18 months'  },
      { maxDays: 1080,     color: '#f97316', label: '18–36 months' },
      { maxDays: Infinity, color: '#ef4444', label: '3+ years'     },
    ],
  },
  yearly: {
    label: 'Yearly',
    hint:  'Year-by-year over a 5-year span',
    buckets: [
      { maxDays: 365,      color: '#3b82f6', label: '≤ 1 year'  },
      { maxDays: 730,      color: '#06b6d4', label: '≤ 2 years' },
      { maxDays: 1095,     color: '#facc15', label: '≤ 3 years' },
      { maxDays: 1460,     color: '#f97316', label: '≤ 4 years' },
      { maxDays: Infinity, color: '#ef4444', label: '5+ years'  },
    ],
  },
};

const RECENCY_PRESET_STORAGE_KEY = 'heatmap_recency_preset_v1';

let recencyPreset = (() => {
  try {
    const v = localStorage.getItem(RECENCY_PRESET_STORAGE_KEY);
    if (v && RECENCY_PRESETS[v]) return v;
  } catch {}
  return 'seasonal';
})();

function bucketForDays(days) {
  const buckets = RECENCY_PRESETS[recencyPreset].buckets;
  for (const b of buckets) if (days <= b.maxDays) return b;
  return buckets[buckets.length - 1];
}

function setRecencyPreset(name) {
  if (!RECENCY_PRESETS[name] || name === recencyPreset) return;
  recencyPreset = name;
  try { localStorage.setItem(RECENCY_PRESET_STORAGE_KEY, name); } catch {}
  // Repaint with the new bucket boundaries; updateRouteLegend runs from
  // inside renderRecency and will rebuild the chip row + bucket swatches.
  if (viewMode === 'recency' && mapView !== '3d') renderRecency();
}

function renderRecency() {
  if (heatLayer) { heatLayer.remove(); heatLayer = null; }
  routeGroup.clearLayers();

  const today  = Date.now();
  const DAY_MS = 24 * 60 * 60 * 1000;
  const sorted = [...allActivities]
    .filter(a => a.date && a.polyline?.length)
    .sort((a, b) => a.date.localeCompare(b.date));

  for (const act of sorted) {
    const days = (today - new Date(act.date).getTime()) / DAY_MS;
    const { color } = bucketForDays(days);
    L.polyline(act.polyline, { color, weight: 5, opacity: 0.12, interactive: false }).addTo(routeGroup);
    L.polyline(act.polyline, { color, weight: 2, opacity: 0.75, interactive: false }).addTo(routeGroup);
  }
  updateRouteLegend();
}

function render3D() {
  if (heatLayer) { heatLayer.remove(); heatLayer = null; }
  routeGroup.clearLayers();
  init3D();
  if (mb3dReady) update3DLayers();
  updateRouteLegend();
}

function updateRouteLegend() {
  // Drives BOTH legend panels based on viewMode (mode-symmetric across
  // 2D and 3D now that the 3D canvas respects mode):
  //   • Heat    — show the gradient legend, hide the bucket/type panel
  //   • Recency — show preset selector + bucket swatches
  //   • Routes  — show activity-type swatches
  const legendEl     = document.getElementById('legend');
  const heatLegendEl = document.getElementById('heat-legend');
  const eyebrow      = legendEl.querySelector('.panel-eyebrow');
  const rows         = document.getElementById('legend-rows');
  rows.innerHTML = '';

  if (viewMode === 'heat') {
    heatLegendEl.classList.add('visible');
    legendEl.classList.remove('visible');
    return;
  }
  heatLegendEl.classList.remove('visible');

  if (viewMode === 'recency') {
    eyebrow.textContent = 'Last Ridden';
    // Preset selector — small segmented control inside the legend panel.
    const presets = Object.entries(RECENCY_PRESETS)
      .map(([key, p]) => `<button class="leg-preset-btn${key === recencyPreset ? ' active' : ''}" onclick="setRecencyPreset('${key}')" title="${p.hint}">${p.label}</button>`)
      .join('');
    rows.innerHTML = `<div class="leg-presets">${presets}</div>`;
    RECENCY_PRESETS[recencyPreset].buckets.forEach(b => {
      rows.innerHTML += `<div class="leg-row"><div class="leg-dot" style="background:${b.color}"></div><span>${b.label}</span></div>`;
    });
    legendEl.classList.add('visible');
    return;
  }

  // Routes mode
  eyebrow.textContent = 'Activity Type';
  const typesPresent = new Set(allActivities.map(a => a.type || '__untagged__'));
  typesPresent.forEach(t => {
    const color = t === '__untagged__' ? UNTAGGED_COLOR : (TYPE_COLORS[t] || UNTAGGED_COLOR);
    const label = t === '__untagged__' ? 'Untagged' : (TYPE_LABELS[t] || t);
    rows.innerHTML += `<div class="leg-row"><div class="leg-dot" style="background:${color}"></div><span>${label}</span></div>`;
  });
  legendEl.classList.toggle('visible', typesPresent.size > 0);
}

function fitAll() {
  const allPts = allActivities.flatMap(act => act.polyline);
  if (!allPts.length) return;
  map.fitBounds(L.latLngBounds(allPts), { padding: [30, 30] });
}

function fitMostRecent() {
  const recent = mostRecentActivity();
  if (!recent?.polyline?.length) return fitAll();
  map.fitBounds(L.latLngBounds(recent.polyline), { padding: [30, 30] });
}

// Initial load: zoom to most recent ride. Subsequent renders fall back to
// fit-all (e.g. user filtered to a year before they panned). Once the user
// pans/zooms, we never auto-fit again.
function autoFit() {
  if (userInteracted || !allActivities.length) return;
  if (!initialFitDone) {
    fitMostRecent();
    initialFitDone = true;
  } else {
    fitAll();
  }
}

// Heat radius/blur scale with zoom — bigger blobs at city scale, finer
// resolution at trail scale. Tightened so heat reads as routes-with-density
// rather than a continuous wash of colour.
function heatParamsForZoom(z) {
  if (z <= 9)  return { radius: 9,  blur: 14 };
  if (z <= 11) return { radius: 7,  blur: 11 };
  if (z <= 13) return { radius: 5,  blur: 9  };
  if (z <= 15) return { radius: 4,  blur: 7  };
  return                { radius: 3, blur: 5  };
}

function updateStats() {
  const count = allActivities.length;
  const dist  = allActivities.reduce((s, a) => s + (a.distance_km || 0), 0);
  document.getElementById('ov-count').textContent = count;
  document.getElementById('ov-dist').textContent  = `${fmtNum(dist, 1)} km`;
  document.getElementById('ov-rides').textContent = count ? `${count} ride${count !== 1 ? 's' : ''}` : '--';
}

// ─── Client-side filtering ────────────────────────────────────────────────────
// allLoaded holds every activity; visibleActivities is the filtered subset
// used by render functions. Filter clicks update visibleActivities and re-render
// without re-streaming.
let allLoaded = [];

function applyFilter({ refit = true } = {}) {
  allActivities = allLoaded.filter(a => {
    if (activeYear !== 'all' && (!a.date || !a.date.startsWith(activeYear))) return false;
    if (activeTypes.size > 0 && !activeTypes.has(a.type || '')) return false;
    return true;
  });
  render({ refit });
}

function render({ refit = false } = {}) {
  if (mapView === '3d')             render3D();
  else if (viewMode === 'heat')     renderHeat();
  else if (viewMode === 'recency')  renderRecency();
  else                              renderRoutes();
  if (refit) autoFit();
  updateStats();
}

// ─── Mode toggle (Heat / Routes / Recency — 2D visualization) ────────────────
function setMode(mode) {
  viewMode = mode;
  ['heat', 'routes', 'recency'].forEach(m =>
    document.getElementById(`btn-${m}`).classList.toggle('active', mode === m));

  // Recency is inherently a lifetime view — narrowing by year would just
  // hide the "haven't been here in years" signal we want to surface. Snap
  // the year back to "All" on entering Recency; the rebuilt filter UI
  // applies the lock styling and the inline hint.
  const yearChanged = (mode === 'recency' && activeYear !== 'all');
  if (yearChanged) activeYear = 'all';
  buildFilterUI();

  // Mode switches must NEVER refit — the user's current camera is sacred.
  // applyFilter is invoked only when the year actually changed (Recency
  // forced 'all'); pass refit:false so the data filter rebuilds without
  // moving the map.
  if (!activeSource && allActivities.length > 0) {
    if (yearChanged) applyFilter({ refit: false });
    else             render();
  }
}

// ─── View toggle (Map / Satellite / 3D — basemap / canvas) ───────────────────
function setMapView(view) {
  mapView = view;
  ['map', 'satellite', '3d'].forEach(v =>
    document.getElementById(`vt-${v}`).classList.toggle('active', v === view));
  const leafletEl = document.getElementById('map');
  const mb3dEl    = document.getElementById('map-3d');
  const exagEl    = document.getElementById('exag-ctrl-3d');

  if (view === '3d') {
    leafletEl.style.display = 'none';
    mb3dEl.style.display    = 'block';
    exagEl.style.display    = 'flex';
  } else {
    leafletEl.style.display = '';
    mb3dEl.style.display    = 'none';
    exagEl.style.display    = 'none';
    // Swap the active basemap tile layer in place.
    map.removeLayer(view === 'map' ? satelliteLayer : streetLayer);
    (view === 'map' ? streetLayer : satelliteLayer).addTo(map);
    map.invalidateSize();
  }

  if (!activeSource && allActivities.length > 0) render();
}

// ─── Fullscreen ──────────────────────────────────────────────────────────────
// Browser Fullscreen API on #map-wrap so just the map area expands; the
// nav/header/filter bar are hidden until the user exits with Esc or the
// button. Both Leaflet and Mapbox need a size refresh after the change.
function toggleFullscreen() {
  const target = document.getElementById('map-wrap');
  if (document.fullscreenElement) {
    document.exitFullscreen?.();
  } else {
    target.requestFullscreen?.();
  }
}

document.addEventListener('fullscreenchange', () => {
  const fs = !!document.fullscreenElement;
  document.getElementById('fs-btn').classList.toggle('active', fs);
  // Allow the layout to settle before the maps recompute their canvas size.
  setTimeout(() => {
    map.invalidateSize();
    if (mb3d) mb3d.resize();
  }, 60);
});

// ─── localStorage cache ──────────────────────────────────────────────────────
// Skip the SSE stream on revisits when the activity set hasn't changed.
// Signature is `count|latest_date` from /api/activities/filters — cheap to
// fetch and catches both new activities and re-imports that bump the latest
// date. Metadata-only edits (renaming, retyping) won't invalidate the cache
// until something is added/removed; for a personal tool that's fine.
const HEATMAP_CACHE_KEY    = 'heatmap_cache_v1';
const HEATMAP_CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000;
const CACHE_TARGET_POINTS  = 1000;

function _signatureFromFilters(acts) {
  if (!acts.length) return '0';
  let latest = '';
  for (const a of acts) if (a.date && a.date > latest) latest = a.date;
  return `${acts.length}|${latest}`;
}

function _downsamplePolyline(poly) {
  const n = poly.length;
  if (n <= CACHE_TARGET_POINTS) return poly;
  const stride = Math.ceil(n / CACHE_TARGET_POINTS);
  const out = [];
  for (let i = 0; i < n; i += stride) out.push(poly[i]);
  return out;
}

function loadHeatmapCache() {
  try {
    const raw = localStorage.getItem(HEATMAP_CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || (Date.now() - obj.cachedAt) > HEATMAP_CACHE_TTL_MS) return null;
    return obj;
  } catch { return null; }
}

function saveHeatmapCache(activities, signature) {
  try {
    const slim = activities.map(a => ({
      ...a,
      polyline: _downsamplePolyline(a.polyline),
    }));
    localStorage.setItem(HEATMAP_CACHE_KEY, JSON.stringify({
      activities: slim, signature, cachedAt: Date.now(),
    }));
  } catch {
    // Quota exceeded or storage disabled — drop any stale entry and move on.
    try { localStorage.removeItem(HEATMAP_CACHE_KEY); } catch {}
  }
}

// ─── Data loading (SSE) ───────────────────────────────────────────────────────
let activeSource = null;

// Fetch all tracks once via SSE, cache in allLoaded. After that, filter changes
// just re-filter in memory — no re-streaming.
function load(signature) {
  if (activeSource) { activeSource.close(); activeSource = null; }
  allLoaded = [];
  allActivities = [];
  if (heatLayer) { heatLayer.remove(); heatLayer = null; }
  routeGroup.clearLayers();

  const loadingEl = document.getElementById('loading');
  const textEl    = document.getElementById('loading-text');
  const barEl     = document.getElementById('loading-bar');
  loadingEl.classList.remove('hidden');
  textEl.textContent = 'Connecting…';
  barEl.style.width  = '0%';

  let total = 0, seen = 0;

  const src = new EventSource('/api/heatmap/stream');
  activeSource = src;

  src.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.total !== undefined) {
      total = msg.total;
      textEl.textContent = `Loading tracks… 0 / ${total}`;
      return;
    }
    if (msg.skip || msg.activity) {
      seen++;
      barEl.style.width = `${total > 0 ? (seen / total) * 100 : 0}%`;
      textEl.textContent = `Loading tracks… ${seen} / ${total}`;
    }
    if (msg.activity) allLoaded.push(msg.activity);
    if (msg.done) {
      src.close(); activeSource = null;
      loadingEl.classList.add('hidden');
      if (signature) saveHeatmapCache(allLoaded, signature);
      applyFilter();   // initial render using current (probably "all") filters
    }
  };

  src.onerror = () => {
    src.close(); activeSource = null;
    document.getElementById('loading-text').textContent = 'Error loading tracks. Try refreshing.';
  };
}

// ─── Filters ─────────────────────────────────────────────────────────────────
// Fetched once from /api/activities/filters (lightweight — no stats or points).
// Filter options always reflect ALL activities so selecting "MTB" doesn't drop
// years from the year filter.

let _filterYears = [];
let _filterTypes = [];

function buildFilterUI() {
  // Year stays single-select — and is locked to "All" when in Recency mode.
  const yearLocked = viewMode === 'recency';
  const yearDiv = document.getElementById('year-filters');
  yearDiv.classList.toggle('locked', yearLocked);
  document.getElementById('year-lock-hint').style.display = yearLocked ? '' : 'none';
  yearDiv.innerHTML = '';
  [['all', 'All'], ..._filterYears.map(y => [String(y), String(y)])].forEach(([val, label]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (val === activeYear ? ' active' : '');
    btn.textContent = label;
    if (yearLocked && val !== 'all') {
      btn.title = 'Year filter not available in Recency mode';
    }
    btn.onclick = () => { activeYear = val; buildFilterUI(); applyFilter(); };
    yearDiv.appendChild(btn);
  });

  // Type is multi-select. Empty Set = "All". Clicking a type toggles it;
  // clicking "All" clears the set.
  const typeDiv = document.getElementById('type-filters');
  typeDiv.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (activeTypes.size === 0 ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => { activeTypes.clear(); buildFilterUI(); applyFilter(); };
  typeDiv.appendChild(allBtn);
  _filterTypes.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeTypes.has(t) ? ' active' : '');
    btn.textContent = TYPE_LABELS[t] || t;
    btn.onclick = () => {
      if (activeTypes.has(t)) activeTypes.delete(t);
      else activeTypes.add(t);
      buildFilterUI();
      applyFilter();
    };
    typeDiv.appendChild(btn);
  });
}

async function initFilters() {
  try {
    const res  = await fetch('/api/activities/filters');
    const acts = await res.json();
    _filterYears = [...new Set(acts.filter(a => a.date).map(a => new Date(a.date).getFullYear()))].sort((a, b) => b - a);
    _filterTypes = [...new Set(acts.map(a => a.type).filter(Boolean))].sort();
    buildFilterUI();
    return _signatureFromFilters(acts);
  } catch (e) {
    // Non-fatal — filters just won't appear, and we'll fall through to a
    // cache-less stream load.
    return null;
  }
}

(async () => {
  const signature = await initFilters();
  const cached    = signature ? loadHeatmapCache() : null;
  if (cached && cached.signature === signature) {
    allLoaded = cached.activities;
    document.getElementById('loading').classList.add('hidden');
    applyFilter();
  } else {
    load(signature);
  }
})();
</script>
</body>
</html>
