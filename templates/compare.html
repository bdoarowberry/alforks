<!DOCTYPE html>
<html lang="en">
<head>
  {% include '_head.html' %}
  <title>AlForks – Compare</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/utils.js?v={{ asset_v('utils.js') }}"></script>
  <script src="/static/sync_toast.js?v={{ asset_v('sync_toast.js') }}" defer></script>
  <script src="/static/review_nav.js?v={{ asset_v('review_nav.js') }}" defer></script>
  <link rel="stylesheet" href="/static/base.css?v={{ asset_v('base.css') }}">
  <style>
    /* Page fits the viewport. The previous attempts using flex / grid
       on body weren't propagating a definite height to main on this
       browser, leaving map-charts collapsed at content size (~5px).
       Explicit calc() on main is brittle (hard-codes the 52px header
       from base.css) but bulletproof — flex: 1 children of main now
       have a guaranteed definite parent height to grow into. */
    body { height: 100vh; overflow: hidden; }
    main { box-sizing: border-box; height: calc(100vh - 52px); padding: 18px 22px 24px; max-width: 1680px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 14px; min-height: 0; }
    /* Short viewports (e.g. dev tools docked at the bottom): drop the
       no-scroll viewport-fit so map-wrap's 500px min-height can render
       fully and the user can scroll the page. */
    @media (max-height: 700px) {
      body { height: auto; overflow: visible; }
      main { height: auto; }
    }
    h2 { font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; margin-bottom: 10px; }

    /* Activity pickers */
    .pickers { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .picker { background: var(--bg-card); border: 1px solid var(--border-hair); border-radius: 4px; padding: 12px 14px; }
    .picker.a { border-left: 3px solid #3b82f6; }
    .picker.b { border-left: 3px solid #f59e0b; }
    .picker-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 6px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
    .picker.a .picker-label { color: #3b82f6; }
    .picker.b .picker-label { color: #f59e0b; }
    .picker select { width: 100%; background: transparent; border: 1px solid var(--border-row); border-radius: 4px; color: var(--text-secondary); padding: 6px 8px; font-size: 0.82rem; font-family: inherit; }
    .picker select:focus { outline: none; border-color: var(--accent); }
    /* Type glyph next to picker label (MTB / SNO / SKI / HIK / OTH / FAT). */
    .picker-glyph { display: inline-flex; align-items: center; justify-content: center; height: 16px; padding: 0 6px; border-radius: 3px; font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.05em; }
    .picker-glyph:empty { display: none; }

    /* Map + chart column layout. Flex (not grid) — flex stretches its
       items along the cross-axis by default and doesn't have grid's
       auto-track-collapse pathology with column-flex parents. Below
       1100px we fall back to a stacked layout with normal page scroll. */
    .map-charts { display: flex; gap: 14px; flex: 1; min-height: 0; }
    #map-wrap { flex: 1.6 1 0; min-width: 0; }
    @media (max-width: 1100px) {
      body { height: auto; overflow: visible; }
      .map-charts { flex-direction: column; flex: none; min-height: auto; }
      #map-wrap { flex: none; height: 540px; }
    }

    /* Map wrapper — holds the Leaflet (#compare-map), Mapbox (#map-3d),
       and dual-map container (#map-dual) canvases stacked, plus the
       view-toggle / fullscreen overlay. Each fills the wrapper via
       position: absolute. The min-height is a safety net for short
       viewports where the flex chain above otherwise collapses. */
    #map-wrap { position: relative; min-height: 500px; border-radius: 4px; overflow: hidden; }
    #compare-map { position: absolute; inset: 0; border: 1px solid var(--border-hair); border-radius: 4px; background: var(--bg-page); }
    #map-3d { position: absolute; inset: 0; display: none; border-radius: 4px; }

    /* Dual-map mode — activities in different regions get one map each
       so each track fills its own viewport instead of being a tiny dot
       in a wide combined fit. Triggered by body.dual-map. */
    #map-dual { position: absolute; inset: 0; display: none; grid-template-columns: 1fr 1fr; gap: 6px; }
    body.dual-map #map-dual    { display: grid; }
    body.dual-map #compare-map { display: none; }
    body.dual-map #map-3d      { display: none !important; }
    #dual-map-a, #dual-map-b { position: relative; border: 1px solid var(--border-hair); border-radius: 4px; background: var(--bg-page); overflow: hidden; }
    #dual-map-a { border-left: 3px solid #3b82f6; }
    #dual-map-b { border-left: 3px solid #f59e0b; }
    #dual-map-a .dual-tag, #dual-map-b .dual-tag { position: absolute; top: 8px; left: 8px; z-index: 500; padding: 3px 8px; font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: #fff; border-radius: 3px; pointer-events: none; backdrop-filter: blur(4px); }
    #dual-map-a .dual-tag { background: rgba(59,130,246,0.85); }
    #dual-map-b .dual-tag { background: rgba(245,158,11,0.85); }

    /* Top-right cluster on the map: basemap toggle + fullscreen.
       Same idiom as Heatmap so the chrome reads consistently. */
    #view-controls { position: absolute; top: 10px; right: 10px; z-index: 1000; display: flex; gap: 6px; }
    #view-toggle { display: flex; background: rgba(15,19,19,0.88); border: 1px solid var(--border-hair); border-radius: 4px; overflow: hidden; backdrop-filter: blur(6px); }
    .vtbtn { padding: 5px 12px; background: transparent; color: rgba(255,255,255,0.55); border: none; border-right: 1px solid var(--border-hair); cursor: pointer; font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.12s, background 0.12s; }
    .vtbtn:last-child { border-right: none; }
    .vtbtn:hover:not(.active):not(:disabled) { color: var(--text-secondary); }
    .vtbtn.active { background: rgba(255,255,255,0.10); color: var(--text-primary); }
    .vtbtn:disabled { opacity: 0.35; cursor: default; }
    #fs-btn { padding: 4px 10px; background: rgba(15,19,19,0.88); color: rgba(255,255,255,0.55); border: 1px solid var(--border-hair); border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1; backdrop-filter: blur(6px); transition: color 0.12s, background 0.12s; font-family: var(--font-mono); }
    #fs-btn:hover,
    #fs-btn.active { color: var(--text-primary); background: rgba(255,255,255,0.10); }

    /* Mapbox attribution and zoom controls — match site chrome. */
    .mapboxgl-ctrl-group { background: rgba(15,19,19,0.9) !important; border: 1px solid var(--border-hair) !important; }
    .mapboxgl-ctrl button { background-color: transparent !important; }
    .mapboxgl-ctrl button .mapboxgl-ctrl-icon { filter: invert(0.7); }
    .mapboxgl-ctrl-attrib { background: rgba(15,19,19,0.7) !important; color: var(--text-muted) !important; font-size: 10px; font-family: var(--font-mono); }
    .mapboxgl-ctrl-attrib a { color: var(--text-muted) !important; }

    /* Leaflet control chrome (zoom bar + rotate compass) → static/base.css. */

    /* Chart column — flex item alongside #map-wrap. Scrolls internally
       if content exceeds the available row height. */
    .chart-col { flex: 1 1 280px; min-width: 280px; min-height: 0; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    @media (max-width: 1100px) { .chart-col { flex: none; min-width: 0; } }
    .chart-card { background: var(--bg-card); border: 1px solid var(--border-hair); border-radius: 4px; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
    .chart-head { display: flex; align-items: baseline; gap: 8px; font-size: 0.72rem; color: var(--text-secondary); font-weight: 500; }
    .chart-head .head-sub { color: var(--text-muted); font-size: 0.66rem; font-weight: normal; margin-left: auto; }
    .chart-wrap { position: relative; height: 130px; }
    .chart-empty { font-size: 0.72rem; color: var(--text-muted); text-align: center; padding: 20px 0; }
    /* HR-zones bar uses pure CSS so we don't need another Chart.js instance */
    .zones-grid { display: grid; grid-template-columns: 24px 1fr auto; row-gap: 4px; column-gap: 8px; font-size: 0.7rem; align-items: center; }
    .zones-grid .z-label { color: var(--text-tertiary); }
    .zones-grid .z-bars { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .zones-grid .z-bar { height: 6px; border-radius: 2px; min-width: 1px; }
    .zones-grid .z-bar.a { background: #3b82f6; }
    .zones-grid .z-bar.b { background: #f59e0b; }
    .zones-grid .z-times { color: var(--text-tertiary); font-size: 0.64rem; line-height: 1.1; text-align: right; min-width: 110px; }
    .zones-grid .z-times .a { color: #3b82f6; }
    .zones-grid .z-times .b { color: #f59e0b; }
    .zones-grid .z-times .pct { color: var(--text-tertiary); font-family: var(--font-mono); margin-left: 4px; }

    /* Diff card — sole source of A | B | Δ values. Lives in the chart
       column (after the charts) so it sits beside the map rather than
       sprawling full-width below it. */
    .diff-card { background: var(--bg-card); border: 1px solid var(--border-hair); border-radius: 4px; padding: 12px 14px; }
    .diff-title { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 8px; font-weight: 600; }
    .diff-rows { display: grid; grid-template-columns: 1fr auto auto auto; column-gap: 12px; row-gap: 4px; font-size: 0.78rem; align-items: baseline; }
    .diff-rows .label { color: var(--text-tertiary); }
    .diff-rows .a-val  { color: #3b82f6; text-align: right; }
    .diff-rows .b-val  { color: #f59e0b; text-align: right; }
    .diff-rows .delta  { text-align: right; font-size: 0.72rem; }
    .diff-rows .delta.up   { color: #4ade80; }
    .diff-rows .delta.down { color: #f87171; }
    .diff-rows .delta.flat { color: var(--text-muted); }

    .empty { padding: 32px; text-align: center; color: var(--text-tertiary); font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>AlForks</h1>
  <nav>
    <a href="/">Summary</a>
    <a href="/logs">Logs</a>
    <a href="/heatmap">Heat Map</a>
    <a href="/training">Training</a>
    <a href="/trails">Trails</a>
    <a href="/review">Review<span id="nav-review-badge" class="nav-pill" style="display:none;">0</span></a>
    <a href="/setup">Setup</a>
  </nav>
  <button class="nav-sync-btn" onclick="triggerSyncAll()" title="Sync Strava + Garmin now">Sync</button>
</header>

<main>
  <div style="display:flex;align-items:center;gap:14px;padding:14px 22px 0;">
    <a href="/logs"
       style="font-size:0.85rem;color:rgba(255,255,255,0.7);text-decoration:none;padding:6px 10px;border-radius:3px;border:1px solid rgba(255,255,255,0.08);transition:all 0.12s;flex-shrink:0;"
       onmouseover="this.style.color='#fff';this.style.borderColor='#3b82f6';this.style.background='rgba(59,130,246,0.10)';"
       onmouseout="this.style.color='rgba(255,255,255,0.7)';this.style.borderColor='rgba(255,255,255,0.08)';this.style.background='transparent';">← Logs</a>
    <h1 style="font-size:1.4rem;font-weight:500;color:#fff;letter-spacing:-0.02em;margin:0;">Compare Logs</h1>
  </div>

  <div class="pickers">
    <div class="picker a">
      <div class="picker-label">Activity A · blue<span class="picker-glyph" id="picker-glyph-a"></span></div>
      <select id="picker-a"></select>
    </div>
    <div class="picker b">
      <div class="picker-label">Activity B · amber<span class="picker-glyph" id="picker-glyph-b"></span></div>
      <select id="picker-b"></select>
    </div>
  </div>

  <div class="map-charts">
    <div id="map-wrap">
      <div id="compare-map"></div>
      <div id="map-3d"></div>
      <div id="map-dual">
        <div id="dual-map-a"><span class="dual-tag">A</span></div>
        <div id="dual-map-b"><span class="dual-tag">B</span></div>
      </div>
      <div id="view-controls">
        <div id="view-toggle">
          <button class="vtbtn active" id="vt-map"       onclick="setMapView('map')">Map</button>
          <button class="vtbtn"        id="vt-satellite" onclick="setMapView('satellite')">Satellite</button>
          <button class="vtbtn"        id="vt-3d"        onclick="setMapView('3d')"{% if not mapbox_token %} disabled title="No Mapbox token configured"{% endif %}>3D</button>
        </div>
        <button id="fs-btn" onclick="toggleMapFullscreen('map-wrap')" title="Toggle fullscreen (Esc to exit)" aria-label="Toggle fullscreen">⛶</button>
      </div>
    </div>
    <div class="chart-col">
      <div class="chart-card">
        <div class="chart-head">Elevation profile <span class="head-sub">m vs km</span></div>
        <div class="chart-wrap"><canvas id="chart-elevation"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-head">Speed profile <span class="head-sub">km/h vs km</span></div>
        <div class="chart-wrap"><canvas id="chart-speed"></canvas></div>
      </div>
      <div class="chart-card" id="hr-zones-card" style="display:none">
        <div class="chart-head">HR zone time <span class="head-sub">seconds</span></div>
        <div class="zones-grid" id="hr-zones-body"></div>
      </div>
      <div id="stats-area">
        <div class="empty">Pick two activities to overlay them.</div>
      </div>
    </div>
  </div>
</main>

<script>
const TYPES = {{ types_json | safe }};
const MAPBOX_TOKEN = '{{ mapbox_token }}';

// ─── State ───────────────────────────────────────────────────────────────
let allActivities = [];
let map;
// Track every overlay we draw so we can remove just our own layers and not
// (e.g.) the tile layer or any future highlight rectangles.
let drawnOverlays = [];
let layerA, layerB;
// Cached parsed track data so 3D init / view toggles don't have to re-fetch.
let lastDataA = null, lastDataB = null;
let mapView = 'map';   // 'map' | 'satellite' | '3d'
let mb3d = null, mb3dReady = false, mb3dFitDone = false;

// Dual-map mode — when activity centroids are far apart we render each
// track on its own Leaflet map side-by-side. State for those:
let mapA = null, mapB = null;
let mapAStreet, mapASat, mapBStreet, mapBSat;
let dualOverlaysA = [], dualOverlaysB = [];
let dualMode = false;
const DUAL_THRESHOLD_KM = 15;

function colorFor(slot) { return slot === 'a' ? '#3b82f6' : '#f59e0b'; }

// ─── Map ─────────────────────────────────────────────────────────────────
// Match the basemap conventions used by Logs and Heat Map: OSM street
// + Esri satellite with a toggle button, plus rotate. Keeps the look and
// feel consistent across every interactive map in the app.
let streetLayer, satelliteLayer;

function initMap() {
  // zoomSnap: 0.25 lets fitBounds pick fractional zoom levels so tracks
  // fill the map tightly. Default snap of 1 floors the optimal zoom and
  // can leave 30–50% of the map as empty space around the tracks.
  map = L.map('compare-map', { zoomControl: true, rotate: true, touchRotate: true, zoomSnap: 0.25 })
    .setView([51, -114], 11);
  map.addControl(new L.Control.Rotate({ closeOnZeroBearing: false }));

  streetLayer = makeStreetLayer();
  satelliteLayer = makeSatelliteLayer();
  streetLayer.addTo(map);
}

// ─── Dual-map mode ─────────────────────────────────────────────────────────
// When two activities are in different regions (centroids > 15km apart), we
// render each on its own Leaflet map so each track fills its own viewport
// instead of becoming a dot in a wide combined fit. The 3D button is
// disabled in dual mode; the Map / Satellite toggle still applies (to both
// maps in tandem).

function _trackCentroid(data) {
  if (!data?.points?.length) return null;
  let sumLat = 0, sumLon = 0, n = 0;
  for (const p of data.points) {
    if (Number.isFinite(p?.lat) && Number.isFinite(p?.lon)
        && (p.lat !== 0 || p.lon !== 0)) {
      sumLat += p.lat; sumLon += p.lon; n++;
    }
  }
  return n ? { lat: sumLat / n, lon: sumLon / n } : null;
}

function _haversineKm(a, b) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat);
  const dLon = toRad(b.lon - a.lon);
  const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
  const x = Math.sin(dLat/2) ** 2
          + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

function shouldUseDualMap(dataA, dataB) {
  if (!dataA?.points || !dataB?.points) return false;
  const cA = _trackCentroid(dataA);
  const cB = _trackCentroid(dataB);
  if (!cA || !cB) return false;
  return _haversineKm(cA, cB) > DUAL_THRESHOLD_KM;
}

function ensureDualMaps() {
  if (mapA && mapB) return;
  // Map A
  mapA = L.map('dual-map-a', { zoomControl: true, rotate: true, touchRotate: true, zoomSnap: 0.25 })
    .setView([51, -114], 11);
  mapA.addControl(new L.Control.Rotate({ closeOnZeroBearing: false }));
  mapAStreet = makeStreetLayer();
  mapASat = makeSatelliteLayer();
  // Map B
  mapB = L.map('dual-map-b', { zoomControl: true, rotate: true, touchRotate: true, zoomSnap: 0.25 })
    .setView([51, -114], 11);
  mapB.addControl(new L.Control.Rotate({ closeOnZeroBearing: false }));
  mapBStreet = makeStreetLayer();
  mapBSat = makeSatelliteLayer();
  // Apply current basemap to both
  applyDualBasemap();
}

function applyDualBasemap() {
  if (!mapA || !mapB) return;
  for (const m of [mapA, mapB]) {
    [mapAStreet, mapASat, mapBStreet, mapBSat].forEach(l => { if (l && m.hasLayer(l)) m.removeLayer(l); });
  }
  if (mapView === 'satellite') {
    mapASat.addTo(mapA); mapBSat.addTo(mapB);
  } else {
    mapAStreet.addTo(mapA); mapBStreet.addTo(mapB);
  }
}

// Defensive coord filter → [[lat,lon],...]. Drops NaN / (0,0) / out-of-range
// points which otherwise inflate getBounds() and force fitBounds to zoom way out.
function validLatLngs(points) {
  return (points || [])
    .filter(p => p && Number.isFinite(p.lat) && Number.isFinite(p.lon)
              && (p.lat !== 0 || p.lon !== 0)
              && p.lat >= -90 && p.lat <= 90
              && p.lon >= -180 && p.lon <= 180)
    .map(p => [p.lat, p.lon]);
}

function _drawTrackOnMap(targetMap, data, slot, prevOverlays) {
  prevOverlays.forEach(l => targetMap.removeLayer(l));
  prevOverlays.length = 0;
  if (!data?.points || data.points.length < 2) return null;
  const latlngs = validLatLngs(data.points);
  if (latlngs.length < 2) return null;
  const color = colorFor(slot);
  const layer = L.polyline(latlngs, { color, weight: 3, opacity: 0.9 }).addTo(targetMap);
  prevOverlays.push(layer);
  prevOverlays.push(L.circleMarker(latlngs[0],                  { radius: 6, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.9, weight: 2 }).addTo(targetMap));
  prevOverlays.push(L.circleMarker(latlngs[latlngs.length - 1], { radius: 6, color: '#f97316', fillColor: '#f97316', fillOpacity: 0.9, weight: 2 }).addTo(targetMap));
  return layer;
}

// Fit both dual-mode maps at the SAME zoom level so the two tracks are
// visually comparable in size. Without this, Map A might be zoomed
// further in than Map B (or vice-versa), defeating the point of a
// side-by-side comparison.
function fitDualMapsMatched(layA, layB) {
  if (!mapA || !mapB) return;
  mapA.invalidateSize({ animate: false });
  mapB.invalidateSize({ animate: false });
  const PAD = [12, 12];
  const bA = layA?.getBounds(), bB = layB?.getBounds();
  // Independent fits first to compute each best zoom.
  const zA = bA ? mapA.getBoundsZoom(bA, false, PAD) : null;
  const zB = bB ? mapB.getBoundsZoom(bB, false, PAD) : null;
  // The shared zoom is the lower (more zoomed-out) of the two so both
  // tracks fit within their respective viewports at the SAME scale —
  // a 5km loop next to a 15km loop will visibly look like one is 3×
  // the other rather than both filling the frame.
  const z = (zA != null && zB != null) ? Math.min(zA, zB)
          : (zA ?? zB);
  if (bA && z != null) mapA.setView(bA.getCenter(), z, { animate: false });
  if (bB && z != null) mapB.setView(bB.getCenter(), z, { animate: false });
}

function setDualMode(on) {
  dualMode = on;
  document.body.classList.toggle('dual-map', on);
  const btn3d = document.getElementById('vt-3d');
  if (btn3d) {
    btn3d.disabled = on || !MAPBOX_TOKEN;
    btn3d.title = on
      ? '3D not available in dual-map mode'
      : (MAPBOX_TOKEN ? '' : 'No Mapbox token configured');
  }
  if (on && mapView === '3d') setMapView('map');  // 3D doesn't apply in dual
  if (on) {
    ensureDualMaps();
    // CSS just changed display: ensure both maps refresh size after layout settles.
    requestAnimationFrame(() => {
      mapA?.invalidateSize({ animate: false });
      mapB?.invalidateSize({ animate: false });
    });
  }
}

// ─── Mapbox 3D ────────────────────────────────────────────────────────────
// Lazy init on first switch to 3D. Both tracks render as coloured lines
// (A=blue, B=amber, matching the 2D Leaflet view).
function init3D() {
  if (mb3d) { mb3d.resize(); return; }
  if (!MAPBOX_TOKEN) return;
  mb3d = createTerrain3DMap('map-3d', MAPBOX_TOKEN, () => {
    mb3d.addSource('compare3d', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    mb3d.addLayer({ id: 'compare3d-layer', type: 'line', source: 'compare3d',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': ['get', 'color'], 'line-width': 3, 'line-opacity': 0.9 },
    });
    mb3dReady = true;
    update3DLayers();
    fit3DToBoth();
  });
}

function build3DGeoJSON() {
  const features = [];
  const push = (data, slot) => {
    if (!data?.points || data.points.length < 2) return;
    features.push({
      type: 'Feature',
      properties: { color: colorFor(slot) },
      geometry: { type: 'LineString', coordinates: data.points.map(p => [p.lon, p.lat]) },
    });
  };
  push(lastDataA, 'a');
  push(lastDataB, 'b');
  return { type: 'FeatureCollection', features };
}

function update3DLayers() {
  if (!mb3d || !mb3dReady) return;
  mb3d.getSource('compare3d')?.setData(build3DGeoJSON());
}

function fit3DToBoth() {
  if (!mb3d || !mb3dReady || mb3dFitDone) return;
  const lats = [], lons = [];
  for (const d of [lastDataA, lastDataB]) {
    if (!d?.points) continue;
    for (const p of d.points) { lats.push(p.lat); lons.push(p.lon); }
  }
  if (!lats.length) return;
  mb3d.fitBounds(
    [[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]],
    { padding: 60, pitch: 55, bearing: -15, duration: 1000 }
  );
  mb3dFitDone = true;
}

// ─── View toggle ──────────────────────────────────────────────────────────
function setMapView(view) {
  // 3D is mutually exclusive with dual mode — guard against both.
  if (view === '3d' && dualMode) return;
  mapView = view;
  ['map', 'satellite', '3d'].forEach(v =>
    document.getElementById(`vt-${v}`).classList.toggle('active', v === view));

  const leafletEl = document.getElementById('compare-map');
  const mb3dEl    = document.getElementById('map-3d');

  if (view === '3d') {
    leafletEl.style.display = 'none';
    mb3dEl.style.display    = 'block';
    // Defer init/resize one frame so the browser has applied the
    // display change and the Mapbox container has real dimensions
    // before we measure.
    requestAnimationFrame(() => {
      init3D();
      if (mb3d) mb3d.resize();
      if (mb3dReady) { update3DLayers(); fit3DToBoth(); }
    });
  } else {
    leafletEl.style.display = '';
    mb3dEl.style.display    = 'none';
    swapLeafletBasemap(map, view, streetLayer, satelliteLayer);
    // Dual maps share the same basemap selection.
    applyDualBasemap();
    if (dualMode) {
      mapA?.invalidateSize();
      mapB?.invalidateSize();
    }
  }
}

// ─── Fullscreen ───────────────────────────────────────────────────────────
document.addEventListener('fullscreenchange', () => {
  const fs = !!document.fullscreenElement;
  document.getElementById('fs-btn').classList.toggle('active', fs);
  setTimeout(() => {
    map.invalidateSize();
    if (mb3d) mb3d.resize();
    if (mapA) mapA.invalidateSize();
    if (mapB) mapB.invalidateSize();
  }, 60);
});

function readQuery() {
  const u = new URL(location.href);
  return { a: u.searchParams.get('a') || '', b: u.searchParams.get('b') || '' };
}

function writeQuery(a, b) {
  const u = new URL(location.href);
  if (a) u.searchParams.set('a', a); else u.searchParams.delete('a');
  if (b) u.searchParams.set('b', b); else u.searchParams.delete('b');
  history.replaceState(null, '', u.toString());
}

// ─── Pickers ─────────────────────────────────────────────────────────────
function buildPickers() {
  const sortedActs = [...allActivities].sort((x, y) => (y.date || '').localeCompare(x.date || ''));
  function options(selected) {
    const blank = `<option value="">— pick activity —</option>`;
    const opts = sortedActs.map(a => {
      const date = (a.date || '').slice(0, 10);
      const name = a.meta?.title || a.name || a.filename;
      const dist = a.stats?.distance_km != null ? ` · ${a.stats.distance_km} km` : '';
      const sel = a.filename === selected ? ' selected' : '';
      return `<option value="${a.filename}"${sel}>${date} — ${name}${dist}</option>`;
    }).join('');
    return blank + opts;
  }
  const q = readQuery();
  const pa = document.getElementById('picker-a');
  const pb = document.getElementById('picker-b');
  pa.innerHTML = options(q.a);
  pb.innerHTML = options(q.b);
  pa.onchange = () => onPick();
  pb.onchange = () => onPick();
}

async function onPick() {
  const a = document.getElementById('picker-a').value;
  const b = document.getElementById('picker-b').value;
  if (a && b && a === b) {
    document.getElementById('stats-area').innerHTML =
      '<div class="empty">Pick two different activities to overlay them.</div>';
    return;
  }
  writeQuery(a, b);
  await render(a, b);
}

// ─── Render overlay ──────────────────────────────────────────────────────
async function loadActivity(filename) {
  if (!filename) return null;
  try {
    const r = await fetch(`/api/activity/${encodeURIComponent(filename)}`);
    if (!r.ok) return null;
    return await r.json();
  } catch (e) {
    return null;
  }
}

function fitBoundsBoth(boundsA, boundsB) {
  // Refresh the cached container size first — when render() fires soon
  // after page load (before fonts/layout fully settle), Leaflet may have
  // measured a smaller container, which makes fitBounds pick a lower
  // zoom than the visible map can actually accommodate.
  map.invalidateSize({ animate: false });

  // Build a combined bounds from valid corner points only. extend()
  // mutation has bitten us before — explicit construction is safer.
  const corners = [];
  if (boundsA && boundsA.isValid && boundsA.isValid()) {
    corners.push(boundsA.getSouthWest(), boundsA.getNorthEast());
  }
  if (boundsB && boundsB.isValid && boundsB.isValid()) {
    corners.push(boundsB.getSouthWest(), boundsB.getNorthEast());
  }
  if (!corners.length) return;
  const combined = L.latLngBounds(corners);

  // Two-pass fit: a layout reflow can happen between the polylines
  // mounting and the chart cards mounting (charts can grow the
  // chart-col which nudges the grid). Re-fitting after one frame
  // guarantees the final view uses the settled container size.
  const fit = () => map.fitBounds(combined, { padding: [4, 4], maxZoom: 19, animate: false });
  fit();
  requestAnimationFrame(() => { map.invalidateSize({ animate: false }); fit(); });
}

function drawTrack(data, slot) {
  if (!data || !data.points || data.points.length < 2) return null;
  const latlngs = validLatLngs(data.points);
  if (latlngs.length < 2) return null;
  // Polyline weight matches Logs SEGMENT_STYLES (3) for visual parity
  // when the user navigates between pages.
  const layer = L.polyline(latlngs, {
    color: colorFor(slot),
    weight: 3,
    opacity: 0.9,
  }).addTo(map);
  drawnOverlays.push(layer);
  // Start/end markers — green start, orange end, matching Logs.
  const startM = L.circleMarker(latlngs[0],            { radius: 6, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.9, weight: 2 }).addTo(map);
  const endM   = L.circleMarker(latlngs[latlngs.length - 1], { radius: 6, color: '#f97316', fillColor: '#f97316', fillOpacity: 0.9, weight: 2 }).addTo(map);
  drawnOverlays.push(startM, endM);
  return layer;
}

async function render(aFile, bFile) {
  // Wipe previous overlays only (leaves the tile layer alone).
  drawnOverlays.forEach(l => map.removeLayer(l));
  drawnOverlays = [];
  layerA = layerB = null;
  document.getElementById('stats-area').innerHTML = aFile || bFile
    ? '<div class="empty">Loading…</div>'
    : '<div class="empty">Pick two activities to overlay them.</div>';

  const [dataA, dataB] = await Promise.all([loadActivity(aFile), loadActivity(bFile)]);
  lastDataA = dataA; lastDataB = dataB;
  // Reset 3D fit so the new pair re-frames the camera; subsequent mode
  // toggles within the same pair won't refit.
  mb3dFitDone = false;

  // Decide single combined map vs side-by-side per region.
  const useDual = shouldUseDualMap(dataA, dataB);
  setDualMode(useDual);

  if (useDual) {
    // Each track on its own map, fit at a SHARED zoom level so the two
    // tracks are visually size-comparable.
    const layA = _drawTrackOnMap(mapA, dataA, 'a', dualOverlaysA);
    const layB = _drawTrackOnMap(mapB, dataB, 'b', dualOverlaysB);
    fitDualMapsMatched(layA, layB);
    // Clear single-map overlays so they don't persist if we toggle back.
    drawnOverlays.forEach(l => map.removeLayer(l));
    drawnOverlays = [];
    layerA = layerB = null;
  } else {
    // Single combined map (and 3D, if user is in 3D).
    layerA = drawTrack(dataA, 'a');
    layerB = drawTrack(dataB, 'b');
    fitBoundsBoth(layerA?.getBounds(), layerB?.getBounds());
    if (mapView === '3d') { update3DLayers(); fit3DToBoth(); }
  }

  renderStats(dataA, dataB);
  renderCharts(dataA, dataB);
}

// ─── Charts ──────────────────────────────────────────────────────────────
// Two Chart.js line charts (elevation, speed) overlay both activities on
// distance_km. The HR-zones panel below them is pure CSS bars so we don't
// spin up a third Chart.js instance for a bar chart with 5 categories.
let elevationChart = null, speedChart = null;
const COLOR_A = '#3b82f6', COLOR_B = '#f59e0b';

function lineDataset(label, color, points, valueKey) {
  return {
    label, borderColor: color, backgroundColor: color + '33',
    borderWidth: 1.6, pointRadius: 0, fill: false, tension: 0.15,
    spanGaps: true,
    data: points.map(p => ({ x: p.dist_km, y: p[valueKey] })),
  };
}

function ensureChart(which) {
  const id = which === 'elevation' ? 'chart-elevation' : 'chart-speed';
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: { datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => `${(+items[0].parsed.x).toFixed(2)} km`,
            label: it => {
              const v = it.parsed.y;
              if (v == null) return null;
              const unit = which === 'elevation' ? ' m' : ' km/h';
              return `${it.dataset.label}: ${fmtNum(v, which === 'elevation' ? 0 : 1)}${unit}`;
            },
          },
        },
      },
      scales: {
        x: {
          type: 'linear',
          ticks: { color: '#666', font: { size: 10 }, callback: v => `${v}` },
          grid:  { color: '#1e2128' },
        },
        y: {
          ticks: { color: '#666', font: { size: 10 } },
          grid:  { color: '#1e2128' },
        },
      },
    },
  });
}

function setChart(chart, dataA, dataB, valueKey) {
  const datasets = [];
  if (dataA?.points?.length) datasets.push(lineDataset('A', COLOR_A, dataA.points, valueKey));
  if (dataB?.points?.length) datasets.push(lineDataset('B', COLOR_B, dataB.points, valueKey));
  chart.data.datasets = datasets;
  chart.update('none');
}

function fmtZoneTime(sec) {
  if (!sec) return '0';
  const m = Math.round(sec / 60);
  return m >= 60 ? `${Math.floor(m / 60)}h ${String(m % 60).padStart(2, '0')}m` : `${m}m`;
}

function renderHrZones(dataA, dataB) {
  const card = document.getElementById('hr-zones-card');
  const za = dataA?.stats?.hr_zones, zb = dataB?.stats?.hr_zones;
  // Show the card only when at least one side has zone data — otherwise the
  // empty bars are noise. When only one is present, show its bars alone.
  if (!(Array.isArray(za) && za.some(v => v > 0)) &&
      !(Array.isArray(zb) && zb.some(v => v > 0))) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';
  const labels = ['Z1', 'Z2', 'Z3', 'Z4', 'Z5'];
  // Normalize bar widths against the largest cell across both rides so each
  // zone's relative magnitude is comparable.
  const maxAll = Math.max(
    ...(za || [0, 0, 0, 0, 0]),
    ...(zb || [0, 0, 0, 0, 0]),
    1,  // avoid /0
  );
  // Per-side totals for percentage-of-time-in-zone.
  const totalA = (za || []).reduce((s, v) => s + (v || 0), 0) || 0;
  const totalB = (zb || []).reduce((s, v) => s + (v || 0), 0) || 0;
  const fmtPct = (v, total) =>
    total > 0 ? `<span class="pct">${(v / total * 100).toFixed(0)}%</span>` : '';
  const body = document.getElementById('hr-zones-body');
  body.innerHTML = labels.map((lbl, i) => {
    const va = za?.[i] || 0;
    const vb = zb?.[i] || 0;
    const wa = (va / maxAll * 100).toFixed(1);
    const wb = (vb / maxAll * 100).toFixed(1);
    return `
      <div class="z-label">${lbl}</div>
      <div class="z-bars">
        <div class="z-bar a" style="width:${wa}%"></div>
        <div class="z-bar b" style="width:${wb}%"></div>
      </div>
      <div class="z-times">
        <div class="a">${fmtZoneTime(va)}${fmtPct(va, totalA)}</div>
        <div class="b">${fmtZoneTime(vb)}${fmtPct(vb, totalB)}</div>
      </div>`;
  }).join('');
}

function renderCharts(dataA, dataB) {
  if (!elevationChart) elevationChart = ensureChart('elevation');
  if (!speedChart)     speedChart     = ensureChart('speed');
  setChart(elevationChart, dataA, dataB, 'ele');
  setChart(speedChart,     dataA, dataB, 'speed');
  renderHrZones(dataA, dataB);
}

// ─── Stats panel ─────────────────────────────────────────────────────────
// The picker dropdown already shows date · name · distance, so we don't
// repeat that here — the only stats display is the A | B | Δ diff-card
// below. Activity type is shown via the picker-glyph next to the picker
// label (set by updatePickerGlyph).
function updatePickerGlyph(slot, data) {
  const el = document.getElementById(`picker-glyph-${slot}`);
  if (!el) return;
  const meta = (data && data.meta) || {};
  const t = data
    ? TYPES.find(x => x.id === (meta.type || data.effective_type))
    : null;
  if (!t) {
    el.textContent = '';
    el.style.background = '';
    el.style.color = '';
    return;
  }
  el.textContent = typeGlyph(t);
  // Match the canonical sidebar badge style used everywhere else: dark
  // tinted background with the saturated colour as the text.
  el.style.background = t.bg;
  el.style.color      = t.color;
}

function deltaHtml(metric, aVal, bVal, fmt, higherIsBetter) {
  if (aVal == null || bVal == null) {
    return `<span class="label">${metric}</span><span class="a-val">${aVal != null ? fmt(aVal) : '--'}</span><span class="b-val">${bVal != null ? fmt(bVal) : '--'}</span><span class="delta flat">--</span>`;
  }
  const diff   = bVal - aVal;
  const absD   = Math.abs(diff);
  const pct    = aVal !== 0 ? (diff / aVal * 100) : 0;
  const cls    = diff === 0 ? 'flat' : (higherIsBetter ? (diff > 0 ? 'up' : 'down') : (diff > 0 ? 'down' : 'up'));
  const sign   = diff > 0 ? '+' : (diff < 0 ? '-' : '');
  // Formatters receive the absolute value so fmtDuration / fmtNum never see a
  // negative input — the sign is prepended by deltaHtml above.
  const pctSign = pct > 0 ? '+' : (pct < 0 ? '-' : '');
  const pctStr = aVal !== 0 ? ` (${pctSign}${Math.abs(pct).toFixed(0)}%)` : '';
  return `<span class="label">${metric}</span><span class="a-val">${fmt(aVal)}</span><span class="b-val">${fmt(bVal)}</span><span class="delta ${cls}">${sign}${fmt(absD)}${pctStr}</span>`;
}

function renderStats(dataA, dataB) {
  const area = document.getElementById('stats-area');
  updatePickerGlyph('a', dataA);
  updatePickerGlyph('b', dataB);
  if (!dataA && !dataB) {
    area.innerHTML = '<div class="empty">Pick two activities to overlay them.</div>';
    return;
  }
  if (!(dataA && dataB)) {
    area.innerHTML = '<div class="empty">Pick a second activity to compare.</div>';
    return;
  }
  const sa = dataA.stats || {}, sb = dataB.stats || {};
  area.innerHTML = `<div class="diff-card">
    <div class="diff-title">B − A</div>
    <div class="diff-rows">
      <span class="label" style="grid-column:1"></span>
      <span class="a-val" style="font-size:0.62rem;color:#3b82f6">A</span>
      <span class="b-val" style="font-size:0.62rem;color:#f59e0b">B</span>
      <span class="delta" style="font-size:0.62rem;color:var(--text-tertiary)">Δ</span>
      ${deltaHtml('Distance',   sa.distance_km,   sb.distance_km,   v => `${fmtNum(v, 1)} km`,    true)}
      ${deltaHtml('Climbing',   sa.elev_gain_m,   sb.elev_gain_m,   v => `${fmtNum(v)} m`,        true)}
      ${deltaHtml('Descent',    sa.elev_loss_m,   sb.elev_loss_m,   v => `${fmtNum(v)} m`,        true)}
      ${deltaHtml('Avg speed',  sa.avg_speed_kmh, sb.avg_speed_kmh, v => `${fmtNum(v, 1)} km/h`,  true)}
      ${deltaHtml('Max speed',  sa.max_speed_kmh, sb.max_speed_kmh, v => `${fmtNum(v, 1)} km/h`,  true)}
      ${deltaHtml('Duration',   sa.duration_sec,  sb.duration_sec,  v => fmtDuration(v),          false)}
      ${deltaHtml('Lift count', sa.lift_count,    sb.lift_count,    v => fmtNum(v),               true)}
    </div>
  </div>`;
}

// ─── Init ────────────────────────────────────────────────────────────────
async function init() {
  initMap();
  try {
    const r = await fetch('/api/activities');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allActivities = await r.json();
    if (!Array.isArray(allActivities)) throw new Error('unexpected response shape');
  } catch (e) {
    document.getElementById('stats-area').innerHTML =
      '<div class="empty" style="color:#ef4444">Failed to load activity list: ' + e.message + '</div>';
    return;
  }
  buildPickers();
  const q = readQuery();
  await render(q.a, q.b);
}
init();
</script>
</body>
</html>
