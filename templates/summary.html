<!DOCTYPE html>
<html lang="en">
<head>
  {% include '_head.html' %}
  <title>AlForks – Dashboard</title>
  <link rel="stylesheet" href="/static/base.css?v={{ asset_v('base.css') }}">
  <script src="/static/utils.js?v={{ asset_v('utils.js') }}"></script>
  <style>
    /* Dashboard ("Refined Terminal") — page-local styles. Surface/text/border/
       accent/font tokens all come from base.css; the only net-new tokens are
       the chart-delta semantics below (allowed per design/README.md). */
    :root{ --pos: oklch(0.78 0.15 145); --neg: oklch(0.74 0.14 55); }

    main.dash{max-width:1680px;margin:0 auto;padding:18px 22px 40px;display:flex;flex-direction:column;gap:22px}
    main.dash a{color:inherit;text-decoration:none}
    #dash-root{display:flex;flex-direction:column;gap:22px}
    .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
    .eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--text-tertiary);font-weight:500;font-family:var(--font-sans)}

    /* ── Section label ───────────────────────────────────────────── */
    .section-label{display:flex;align-items:baseline;gap:10px;margin-bottom:-6px}
    .section-label .rule{flex:1;height:1px;background:var(--border-hair);align-self:center}
    .section-sub{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
    .section-sub b{color:var(--text-secondary);font-weight:500}

    /* ── Panels ──────────────────────────────────────────────────── */
    .panel{background:var(--bg-card);border:1px solid var(--border-hair);border-radius:4px}
    .panel-pad{padding:16px 18px}
    .panel-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:13px 18px;border-bottom:1px solid var(--border-hair)}
    .panel-head h2{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:0.01em}

    /* ── Hero band ───────────────────────────────────────────────── */
    .hero{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr 1fr;border:1px solid var(--border-hair);border-radius:4px;background:var(--bg-card);overflow:hidden}
    .hero-cell{padding:16px 18px;border-left:1px solid var(--border-hair);position:relative}
    .hero-cell:first-child{border-left:none}
    .hero-cell.hero-main{background:var(--surface-tint)}
    .hero-cell .eyebrow{margin-bottom:9px}
    .hero-val{font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-primary);font-weight:500;line-height:1;letter-spacing:-0.01em}
    .hero-main .hero-val{font-size:2.6rem}
    .hero-cell .hero-val{font-size:1.5rem}
    .hero-unit{font-size:0.5em;color:var(--text-muted);font-weight:400;margin-left:3px;letter-spacing:0}
    .hero-delta{margin-top:9px;display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--font-mono)}
    .hero-delta .arrow{font-size:10px;line-height:1}
    .hero-delta.up{color:var(--pos)}
    .hero-delta.down{color:var(--neg)}
    .hero-delta .vs{color:var(--text-faint);font-family:var(--font-sans)}

    /* ── Active-days ribbon (promoted) ───────────────────────────── */
    .ribbon-panel .panel-head{gap:16px}
    .cal-legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
    .cal-legend .lg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted)}
    .cal-legend .lg .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .ribbon-scroll{overflow-x:auto;scrollbar-width:thin}
    .ribbon{display:flex;gap:1px;min-width:680px;height:38px;align-items:stretch;border-radius:3px;overflow:hidden}
    .rib-cell{flex:1 1 0;min-width:0;background:var(--surface-tint);border-radius:1px;transition:transform .08s,filter .08s}
    .rib-cell.active{cursor:pointer}
    .rib-cell.active:hover{filter:brightness(1.25)}
    .rib-cell.hovered{outline:1px solid var(--text-primary);outline-offset:-1px;z-index:2;position:relative}
    .ribbon-caption{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-top:9px;font-size:11px;font-family:var(--font-mono);color:var(--text-faint);min-height:16px}
    .ribbon-caption .rc-mid{flex:1;text-align:center;color:var(--text-secondary);transition:color .1s}
    .ribbon-caption .rc-mid.idle{color:var(--text-faint)}

    /* ── Segmented control + chips ───────────────────────────────── */
    .segmented{display:inline-flex;border:1px solid var(--border-hair);border-radius:4px;overflow:hidden}
    .segmented button{font-family:var(--font-sans);font-size:11px;font-weight:500;letter-spacing:0.01em;padding:5px 11px;background:transparent;color:var(--text-tertiary);border:none;border-left:1px solid var(--border-hair);cursor:pointer;transition:color .1s,background .1s;white-space:nowrap}
    .segmented button:first-child{border-left:none}
    .segmented button:hover{color:var(--text-secondary)}
    .segmented button.on{background:var(--accent-soft);color:var(--text-primary)}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{font-family:var(--font-mono);font-size:11px;padding:4px 9px;border-radius:4px;cursor:pointer;border:1px solid var(--border-hair);background:transparent;color:var(--text-muted);display:inline-flex;align-items:center;gap:6px;transition:color .1s,border-color .1s;user-select:none}
    .chip:hover{color:var(--text-secondary)}
    .chip .swatch{width:8px;height:8px;border-radius:1px;display:inline-block;opacity:.35}
    .chip.on{color:var(--text-primary);border-color:var(--border-row)}
    .chip.on .swatch{opacity:1}

    /* ── Chart ───────────────────────────────────────────────────── */
    .chart-wrap{position:relative}
    .chart-svg{display:block;width:100%;height:auto;overflow:visible}
    .chart-svg text{font-family:var(--font-mono);fill:var(--text-faint)}
    .gridline{stroke:var(--border-hair);stroke-width:1;stroke-dasharray:2 3}
    .bar-cur{fill:var(--accent)}
    .bar-prior{fill:none;stroke-width:1.25}
    .bar-hit{fill:transparent;cursor:pointer}
    .axis-mon{font-size:9px;fill:var(--text-faint);text-anchor:middle}
    .tooltip{position:absolute;pointer-events:none;z-index:20;opacity:0;transition:opacity .08s;background:var(--bg-elev);border:1px solid var(--border-row);border-radius:4px;padding:6px 9px;font-size:11px;color:var(--text-primary);white-space:nowrap;font-family:var(--font-mono);box-shadow:0 6px 20px rgba(0,0,0,.5);transform:translate(-50%,-110%)}
    .tooltip .tt-lab{color:var(--text-tertiary);font-family:var(--font-sans);font-size:10px;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:2px}

    /* ── Records strip ───────────────────────────────────────────── */
    .pr-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1px;background:var(--border-hair);border:1px solid var(--border-hair);border-radius:4px;overflow:hidden}
    .pr-cell{background:var(--bg-card);padding:13px 15px 13px 16px;position:relative;transition:background .1s;display:block}
    .pr-cell:hover{background:var(--bg-elev)}
    .pr-cell::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--type-accent)}
    .pr-cell .pr-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:7px}
    .pr-label{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-tertiary);font-weight:500}
    .pr-badge{font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:.06em;color:var(--type-accent);border:1px solid var(--type-accent);opacity:.9;padding:1px 5px;border-radius:3px}
    .pr-val{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:1.3rem;color:var(--text-primary);font-weight:500;line-height:1.1;margin-bottom:5px}
    .pr-meta{font-size:11px;color:var(--text-muted);display:flex;justify-content:space-between;gap:8px}
    .pr-meta .pr-ride{color:var(--text-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pr-meta .pr-date{font-family:var(--font-mono);flex-shrink:0;color:var(--text-faint)}

    /* ── Tab bar ─────────────────────────────────────────────────── */
    .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border-hair);overflow-x:auto;scrollbar-width:none}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--text-tertiary);background:transparent;border:none;padding:10px 16px;cursor:pointer;position:relative;white-space:nowrap;transition:color .12s}
    .tab-btn:hover{color:var(--text-secondary)}
    .tab-btn.on{color:var(--text-primary)}
    .tab-btn.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.on{display:block;animation:fade .18s ease}
    @keyframes fade{from{opacity:0}to{opacity:1}}

    /* ── By Activity cards ───────────────────────────────────────── */
    .act-list{display:flex;flex-direction:column;gap:12px}
    .act-card{border:1px solid var(--border-hair);border-radius:4px;background:var(--bg-card);overflow:hidden}
    .act-card-head{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;position:relative;transition:background .1s}
    .act-card-head::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--type-accent)}
    .act-card-head:hover{background:var(--bg-elev)}
    .glyph-badge{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--type-accent);background:var(--type-accent-soft);border:1px solid var(--type-accent);border-radius:4px;width:46px;height:32px;display:grid;place-items:center;flex-shrink:0}
    .act-head-label{font-size:14px;font-weight:600;color:var(--text-primary);flex-shrink:0;min-width:108px}
    .act-head-stats{display:flex;flex-wrap:wrap;gap:5px 18px;flex:1;align-items:baseline}
    .act-stat{font-size:11px;color:var(--text-muted);white-space:nowrap}
    .act-stat b{font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-secondary);font-weight:500;font-size:12.5px}
    .act-delta{font-family:var(--font-mono);font-size:10px;margin-left:5px;letter-spacing:0}
    .act-delta.up{color:var(--pos)}
    .act-delta.down{color:var(--neg)}
    .act-head-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
    .act-ago{font-size:10.5px;font-family:var(--font-mono);color:var(--text-faint);white-space:nowrap}
    .caret{color:var(--text-faint);font-size:11px;transition:transform .15s;font-family:var(--font-mono)}
    .act-card.open .caret{transform:rotate(90deg)}
    .act-body{display:none;border-top:1px solid var(--border-hair)}
    .act-card.open .act-body{display:block}
    .act-body-grid{display:grid;grid-template-columns:1.7fr 1fr;gap:0}
    .act-body-grid > div{padding:16px 18px}
    .act-body-grid > div:last-child{border-left:1px solid var(--border-hair)}
    .body-section-label{margin-bottom:12px}
    .speed-pair{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border-hair);border:1px solid var(--border-hair);border-radius:4px;overflow:hidden;margin-bottom:16px}
    .speed-pair > div{background:var(--bg-card);padding:11px 13px}
    .speed-pair .eyebrow{margin-bottom:6px}
    .speed-pair .sp-val{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:1.25rem;color:var(--text-primary);font-weight:500}
    .speed-pair .sp-unit{font-size:.5em;color:var(--text-muted);margin-left:3px}

    /* Side-by-side record columns inside an expanded card */
    .rec-twin{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border-hair);border:1px solid var(--border-hair);border-radius:4px;overflow:hidden}
    .rec-twin > div{background:var(--bg-card);padding:12px 14px}
    .rec-twin .col-label{margin-bottom:9px}
    .rec-twin .col-label.all{color:var(--type-accent)}
    .rec-list{display:flex;flex-direction:column}
    .rec-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-hair);font-size:12px}
    .rec-row:last-child{border-bottom:none}
    .rec-row:hover .rec-val{color:var(--accent)}
    .rec-row .rec-label{color:var(--text-tertiary);font-size:11px;text-transform:uppercase;letter-spacing:.08em;min-width:62px;flex-shrink:0}
    .rec-row .rec-val{font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-primary);font-weight:500;flex-shrink:0;text-align:right;transition:color .1s}
    .act-footer{display:flex;gap:18px;flex-wrap:wrap;padding:11px 18px;border-top:1px solid var(--border-hair);background:var(--bg-page)}
    .foot-link{font-size:11.5px;color:var(--link);font-family:var(--font-sans);transition:color .1s}
    .foot-link:hover{color:var(--text-primary)}

    /* ── Records tab — per-sport card grid ───────────────────────── */
    .rec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .rec-type-card{border:1px solid var(--border-hair);border-radius:4px;background:var(--bg-card);overflow:hidden}
    .rec-type-head{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border-hair);position:relative}
    .rec-type-head::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--type-accent)}
    .rt-glyph{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--type-accent);background:var(--type-accent-soft);border:1px solid var(--type-accent);border-radius:4px;width:46px;height:32px;display:grid;place-items:center;flex-shrink:0}
    .rt-label{font-size:14px;font-weight:600;color:var(--text-primary)}
    .rec-cols{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border-hair)}
    .rec-col{background:var(--bg-card);padding:14px 16px}
    .rec-col .col-label{margin-bottom:10px}
    .rec-col .col-label.all{color:var(--type-accent)}
    .rec-col .rec-row{flex-wrap:wrap}
    .rec-col .rec-row .rec-ride{color:var(--text-muted);flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .rec-col .rec-row:hover .rec-ride{color:var(--text-secondary)}
    .rec-col .rec-row .rec-date{font-family:var(--font-mono);color:var(--text-faint);font-size:10.5px;flex-shrink:0;width:100%;text-align:right;margin-top:1px}

    /* ── Loading / empty / error ─────────────────────────────────── */
    .dash-loading{padding:48px;text-align:center;color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px}
    .dash-empty{max-width:540px;margin:56px auto;padding:32px;text-align:center;background:var(--bg-card);border:1px solid var(--border-hair);border-radius:4px}
    .dash-empty h2{margin:0 0 8px;font-size:20px;color:var(--text-primary)}
    .dash-empty p{margin:0 0 24px;color:var(--text-secondary);font-size:14px;line-height:1.5}
    .dash-empty .cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .dash-empty a.btn{display:inline-block;padding:9px 16px;border-radius:4px;font-size:13px;border:1px solid var(--border-row);color:var(--text-secondary)}
    .dash-empty a.btn.primary{color:var(--text-primary);border-color:var(--accent)}
    .dash-empty a.btn:hover{background:var(--surface-tint)}

    /* ── Responsive ──────────────────────────────────────────────── */
    @media(max-width:1200px){
      .hero{grid-template-columns:1.4fr 1fr 1fr 1fr}
      .hero-cell.hero-main{grid-column:1 / -1}
      .hero-cell:nth-child(n+2){border-top:1px solid var(--border-hair)}
      .hero-main .hero-val{font-size:2.4rem}
    }
    @media(max-width:980px){ .rec-grid{grid-template-columns:1fr} }
    @media(max-width:760px){
      .act-body-grid{grid-template-columns:1fr}
      .act-body-grid > div:last-child{border-left:none;border-top:1px solid var(--border-hair)}
      .act-head-label{min-width:0}
      .rec-twin{grid-template-columns:1fr}
      .rec-cols{grid-template-columns:1fr}
    }
    @media(max-width:560px){
      main.dash{padding:14px 13px 36px}
      .hero{grid-template-columns:1fr 1fr}
      .hero-cell{border-left:none}
      .hero-cell:nth-child(n){border-top:1px solid var(--border-hair)}
      .hero-cell:first-child{border-top:none}
      .hero-cell.hero-main{grid-column:1 / -1}
      .panel-head{padding:11px 13px}
      .panel-pad{padding:13px}
      .act-head-stats{display:none}
      .act-card-head{gap:11px}
      .ribbon{min-width:540px;height:34px}
    }
    @media(max-width:400px){
      .hero{grid-template-columns:1fr}
      .hero-main .hero-val{font-size:2.1rem}
    }
  </style>
</head>
<body>

<header>
  <h1><span>Al</span>Forks</h1>
  {% set nav_active = 'dashboard' %}
  {% include '_nav.html' %}
</header>

<main class="dash">
  <h1 class="page-title">Dashboard</h1>
  <div id="dash-root">
    <div class="dash-loading">Loading dashboard…</div>
  </div>
</main>

<script>
(function(){
  'use strict';
  const $  = (s,r=document)=>r.querySelector(s);
  const el = (t,c,h)=>{const n=document.createElement(t);if(c)n.className=c;if(h!=null)n.innerHTML=h;return n;};
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // ── Format helpers ───────────────────────────────────────────────────────
  function fmtDist(km){ if(km==null)return '—'; return km<100 ? km.toFixed(1) : Math.round(km).toLocaleString(); }
  function fmtSpeed(k){ return k==null ? '—' : k.toFixed(1); }
  function fmtHours(h){ h=h||0; const hr=Math.floor(h), mn=Math.round((h-hr)*60); return `${hr}h ${String(mn).padStart(2,'0')}m`; }
  function fmtDur(sec){ sec=sec||0; const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60); return h>0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`; }
  function fmtDateShort(iso){ if(!iso)return ''; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  function pct(cur,prev){ if(!prev)return null; return Math.round((cur-prev)/prev*100); }
  function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  // fmtElev is shared via /static/utils.js (null-safe, rounds + locales); fall back defensively.
  const fmtElevSafe = (typeof fmtElev==='function') ? fmtElev : (m=>Math.round(m||0).toLocaleString());
  function hexA(hex,a){ const h=String(hex||'#3b82f6').replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; }

  // A record entry has exactly one of value_km/value_m/value_kmh/value_sec.
  function recNum(rec){ if(rec.value_km!=null)return rec.value_km; if(rec.value_m!=null)return rec.value_m; if(rec.value_kmh!=null)return rec.value_kmh; if(rec.value_sec!=null)return rec.value_sec; return 0; }
  function recVal(rec){
    switch(rec.kind){
      case 'dist':  return fmtDist(rec.value_km)+' km';
      case 'elev':  return fmtElevSafe(rec.value_m)+' m';
      case 'speed': return (rec.value_kmh==null?'—':rec.value_kmh.toFixed(1))+' km/h';
      case 'dur':   return fmtDur(rec.value_sec);
      default:      return '';
    }
  }
  function logHref(filename){ return filename ? '/log/'+encodeURIComponent(filename) : '#'; }

  // ── State ────────────────────────────────────────────────────────────────
  let DATA=null, typeById={}, HISTORY_ALL={}, YEARS=[], CUR_YEAR=null;

  const METRIC_DEFS = {
    distance:{label:'Distance',  unit:'km', fmt:v=>Math.round(v).toLocaleString()},
    duration:{label:'Time',      unit:'h',  fmt:v=>v.toFixed(1)},
    ascent:  {label:'Climbing',  unit:'m',  fmt:v=>Math.round(v).toLocaleString()},
    descent: {label:'Vertical',  unit:'m',  fmt:v=>Math.round(v).toLocaleString()},
    count:   {label:'Activities',unit:'',   fmt:v=>Math.round(v).toLocaleString()},
  };
  const CROSS_METRICS = ['distance','duration','ascent','count'];

  // ── Chart component (reusable; hand-rolled SVG) ──────────────────────────
  function makeChart(host, tooltip, getSeries, state){
    function niceMax(m){
      // Finer steps than 1/2/2.5/5/10 so the top gridline sits close to the
      // data max — otherwise e.g. a 110 max snaps to a 200 scale (~45% dead space).
      const pow=Math.pow(10,Math.floor(Math.log10(m)));
      const n=m/pow;
      const steps=[1,1.2,1.5,2,2.5,3,4,5,6,8,10];
      let f=10;
      for(let i=0;i<steps.length;i++){ if(n<=steps[i]){ f=steps[i]; break; } }
      return f*pow;
    }
    function showTip(ev,mon,year,val,md){
      tooltip.innerHTML=`<span class="tt-lab">${md.label}</span>${mon} ${year} · ${md.fmt(val)}${md.unit?(' '+md.unit):''}`;
      const wrap=tooltip.parentElement.getBoundingClientRect();
      tooltip.style.left=(ev.clientX-wrap.left)+'px';
      tooltip.style.top=(ev.clientY-wrap.top)+'px';
      tooltip.style.opacity='1';
    }
    function hideTip(){ tooltip.style.opacity='0'; }
    function render(){
      host.innerHTML='';
      const W=920,H=140,padL=42,padR=12,padT=12,padB=20;
      const plotW=W-padL-padR, plotH=H-padT-padB;
      const md=METRIC_DEFS[state.metric];
      let max=0;
      state.years.forEach(y=>{(getSeries(state.metric,y)||[]).forEach(v=>{if(v!=null&&v>max)max=v;});});
      if(max<=0)max=1;
      const nice=niceMax(max);
      const yScale=v=>padT+plotH-(v/nice)*plotH;
      const colW=plotW/12;
      const yearsSorted=[...state.years].sort((a,b)=>a-b);

      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
      svg.setAttribute('class','chart-svg');
      svg.setAttribute('preserveAspectRatio','xMidYMid meet');

      [0,0.5,1].forEach(frac=>{
        const yv=nice*frac, yy=yScale(yv);
        const line=document.createElementNS(svg.namespaceURI,'line');
        line.setAttribute('x1',padL);line.setAttribute('x2',W-padR);
        line.setAttribute('y1',yy);line.setAttribute('y2',yy);
        line.setAttribute('class','gridline');
        if(frac===0)line.setAttribute('stroke-dasharray','none');
        svg.appendChild(line);
        const t=document.createElementNS(svg.namespaceURI,'text');
        t.setAttribute('x',padL-7);t.setAttribute('y',yy+3);
        t.setAttribute('text-anchor','end');t.setAttribute('font-size','9');
        t.textContent=md.fmt(yv);
        svg.appendChild(t);
      });

      const innerPad=colW*0.16;
      const groupW=colW-innerPad*2;
      const nY=yearsSorted.length;
      const bw=Math.max(3, Math.min(groupW/nY - 2, 16));
      const gap=(groupW-(bw*nY))/Math.max(1,(nY-1)) || 0;

      MONTHS.forEach((mon,mi)=>{
        const gx=padL+mi*colW+innerPad;
        yearsSorted.forEach((y,yi)=>{
          const series=getSeries(state.metric,y)||[];
          const v=series[mi];
          const bx=gx+yi*(bw+(nY>1?gap:0));
          if(v!=null){
            const by=yScale(v), bh=padT+plotH-by;
            const rect=document.createElementNS(svg.namespaceURI,'rect');
            rect.setAttribute('x',bx);rect.setAttribute('width',bw);
            rect.setAttribute('y',by);rect.setAttribute('height',Math.max(0,bh));
            if(y===CUR_YEAR){ rect.setAttribute('class','bar-cur'); }
            else { rect.setAttribute('class','bar-prior'); rect.setAttribute('stroke', hexA('#ffffff', 0.28 + 0.12*yi)); }
            rect.setAttribute('rx','0.5');
            svg.appendChild(rect);
            const hit=document.createElementNS(svg.namespaceURI,'rect');
            hit.setAttribute('x',bx-1);hit.setAttribute('width',bw+2);
            hit.setAttribute('y',padT);hit.setAttribute('height',plotH);
            hit.setAttribute('class','bar-hit');
            hit.addEventListener('mousemove',ev=>showTip(ev,mon,y,v,md));
            hit.addEventListener('mouseleave',hideTip);
            svg.appendChild(hit);
          }
        });
        const t=document.createElementNS(svg.namespaceURI,'text');
        t.setAttribute('x',padL+mi*colW+colW/2);t.setAttribute('y',H-7);
        t.setAttribute('class','axis-mon');
        t.textContent=mon;
        svg.appendChild(t);
      });
      host.appendChild(svg);
    }
    return {render};
  }

  // ── Cross-activity history (sum per-type history) ────────────────────────
  function buildHistoryAll(){
    const all={};
    CROSS_METRICS.forEach(metric=>{
      all[metric]={};
      YEARS.forEach(y=>{
        const acc=new Array(12).fill(null);
        Object.keys(DATA.history).forEach(tid=>{
          const yr=(DATA.history[tid]||{})[String(y)];
          if(!yr) return;
          const arr=yr[metric];
          if(!arr) return;
          for(let m=0;m<12;m++){ const v=arr[m]; if(v==null) continue; acc[m]=(acc[m]==null?0:acc[m])+v; }
        });
        all[metric][y]=acc;
      });
    });
    return all;
  }

  // ── Renderers ────────────────────────────────────────────────────────────
  function deltaHTML(cur,prev){
    const p=pct(cur,prev);
    if(p==null) return '';
    const up=p>=0, cls=up?'up':'down', arrow=up?'&#9650;':'&#9660;';
    return `<div class="hero-delta ${cls}"><span class="arrow">${arrow}</span><span>${up?'+':''}${p}%</span><span class="vs">vs prior ${DATA.daysBack||365}d</span></div>`;
  }
  function miniDelta(cur,prev){
    const p=pct(cur,prev);
    if(p==null) return '';
    const up=p>=0;
    return `<span class="act-delta ${up?'up':'down'}">${up?'&#9650;':'&#9660;'}${Math.abs(p)}%</span>`;
  }
  function heroCell(eyebrow,val,unit,delta,main){
    const c=el('div','hero-cell'+(main?' hero-main':''));
    c.innerHTML=`<div class="eyebrow">${eyebrow}</div><div class="hero-val">${val}${unit?`<span class="hero-unit">${unit}</span>`:''}</div>${delta}`;
    return c;
  }

  function shell(){
    return `
      <div class="section-label">
        <span class="eyebrow">Last 365 days</span>
        <span class="rule"></span>
        <span class="section-sub" id="window-range"></span>
      </div>
      <section class="hero" id="hero"></section>
      <section class="panel ribbon-panel">
        <div class="panel-head">
          <h2>Active Days</h2>
          <div class="cal-legend" id="cal-legend" style="margin-left:auto"></div>
        </div>
        <div class="panel-pad">
          <div class="ribbon-scroll"><div class="ribbon" id="ribbon"></div></div>
          <div class="ribbon-caption">
            <span class="rc-left" id="rc-left">365 days back</span>
            <span class="rc-mid idle" id="ribbon-mid">Hover a day for details</span>
            <span class="rc-right">today &rarr;</span>
          </div>
        </div>
      </section>
      <section class="panel">
        <div class="panel-head">
          <h2>Cross-Activity · Year over Year</h2>
          <div class="segmented" id="metric-switch" style="margin-left:auto"></div>
          <div class="chips" id="year-chips"></div>
        </div>
        <div class="panel-pad chart-wrap" id="all-chart-wrap">
          <div id="all-chart"></div>
          <div class="tooltip" id="all-tooltip"></div>
        </div>
      </section>
      <section id="recent-section">
        <div class="section-label" style="margin-bottom:10px">
          <span class="eyebrow">Top performances · last 365 days</span>
          <span class="rule"></span>
        </div>
        <div class="pr-strip" id="pr-strip"></div>
      </section>
      <section style="margin-top:6px">
        <div class="tab-bar" id="tab-bar">
          <button class="tab-btn on" data-tab="activity">By Activity</button>
          <button class="tab-btn" data-tab="records">Records</button>
        </div>
        <div class="tab-panel on" data-panel="activity" style="margin-top:16px">
          <div class="act-list" id="act-list"></div>
        </div>
        <div class="tab-panel" data-panel="records" style="margin-top:16px">
          <div class="rec-grid" id="rec-grid"></div>
        </div>
      </section>`;
  }

  function renderWindowRange(){
    // The "Last 365 days" header carries the last-activity meta (the explicit
    // date range was redundant — the label already says the window).
    const T=DATA.totals||{};
    $('#window-range').innerHTML = T.last_date
      ? `Last activity <b>${fmtDateShort(T.last_date)}</b> · ${T.days_since}d ago · active <b>${T.last_14d_active_days??0}</b> of last 14`
      : 'No recent activity';
    $('#rc-left').textContent=(DATA.daysBack||365)+' days back';
  }

  function renderHero(){
    const T=DATA.totals||{}, P=DATA.totalsPrev||{}, host=$('#hero');
    host.appendChild(heroCell('Distance', fmtDist(T.distance_km), 'km', deltaHTML(T.distance_km,P.distance_km), true));
    host.appendChild(heroCell('Moving time', fmtHours(T.moving_h), '', deltaHTML(T.moving_h,P.moving_h)));
    host.appendChild(heroCell('Climbing', fmtElevSafe(T.elev_gain_m), 'm', deltaHTML(T.elev_gain_m,P.elev_gain_m)));
    host.appendChild(heroCell('Descent', fmtElevSafe(T.elev_loss_m), 'm', deltaHTML(T.elev_loss_m,P.elev_loss_m)));
    host.appendChild(heroCell('Days out', String(T.days??0), '', deltaHTML(T.days,P.days)));
    host.appendChild(heroCell('Activities', String(T.activities??0), '', deltaHTML(T.activities,P.activities)));
  }

  function localIso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

  function renderRibbon(){
    const host=$('#ribbon'), mid=$('#ribbon-mid'), idleText='Hover a day for details';
    const daysBack=DATA.daysBack||365;
    const end=new Date(DATA.today+'T00:00:00');
    for(let i=daysBack-1;i>=0;i--){
      const d=new Date(end); d.setDate(end.getDate()-i);
      const iso=localIso(d);
      const typeId=DATA.dominantByDate[iso]||null;
      const a=el('a','rib-cell'+(typeId?' active':''));
      const dateLabel=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
      if(typeId){
        const t=typeById[typeId]||{accent:'#3b82f6',label:typeId};
        a.href=`/logs?start=${iso}&end=${iso}`;
        a.style.background=t.accent;
        a.addEventListener('mouseenter',()=>{ mid.classList.remove('idle'); mid.innerHTML=`${dateLabel} · <span style="color:${t.accent}">${escapeHtml(t.label)}</span>`; a.classList.add('hovered'); });
      } else {
        a.href='#';
        a.addEventListener('mouseenter',()=>{ mid.classList.remove('idle'); mid.innerHTML=`${dateLabel} · <span style="color:var(--text-faint)">Rest day</span>`; a.classList.add('hovered'); });
      }
      a.addEventListener('mouseleave',()=>{ mid.classList.add('idle'); mid.textContent=idleText; a.classList.remove('hovered'); });
      host.appendChild(a);
    }
    const legend=$('#cal-legend');
    DATA.activities.forEach(t=>{
      const lg=el('span','lg'); lg.innerHTML=`<span class="dot" style="background:${t.accent}"></span>${escapeHtml(t.label)}`; legend.appendChild(lg);
    });
    const off=el('span','lg'); off.innerHTML=`<span class="dot" style="background:var(--surface-tint);border:1px solid var(--border-hair)"></span>Rest`; legend.appendChild(off);
  }

  function renderCrossChart(){
    const state={metric:'distance', years:YEARS.slice(-3)};
    const chart=makeChart($('#all-chart'), $('#all-tooltip'), (metric,year)=>HISTORY_ALL[metric][year], state);
    const ms=$('#metric-switch');
    CROSS_METRICS.forEach(m=>{
      const b=el('button',m===state.metric?'on':'',METRIC_DEFS[m].label);
      b.addEventListener('click',()=>{ state.metric=m; [...ms.children].forEach(c=>c.classList.remove('on')); b.classList.add('on'); chart.render(); });
      ms.appendChild(b);
    });
    const yc=$('#year-chips');
    [...YEARS].sort((a,b)=>b-a).forEach(y=>{
      const on=state.years.includes(y);
      const chip=el('span','chip'+(on?' on':''));
      chip.innerHTML=`<span class="swatch" style="background:${y===CUR_YEAR?'var(--accent)':'rgba(255,255,255,.5)'}"></span>${y}`;
      chip.addEventListener('click',()=>{
        const idx=state.years.indexOf(y);
        if(idx>=0){ if(state.years.length>1){ state.years.splice(idx,1); chip.classList.remove('on'); } }
        else { state.years.push(y); chip.classList.add('on'); }
        chart.render();
      });
      yc.appendChild(chip);
    });
    chart.render();
  }

  // Cross-activity "recent records" = best per category across sports (window).
  function renderRecentStrip(){
    const host=$('#pr-strip');
    const CATS=[['dist','Longest'],['climb','Most climbing'],['descent','Biggest descent'],['speed','Top speed'],['dur','Longest moving']];
    function catKey(rec){
      if(rec.kind==='dist')return 'dist';
      if(rec.kind==='speed')return 'speed';
      if(rec.kind==='dur')return 'dur';
      if(rec.kind==='elev')return rec.label==='Climbing'?'climb':'descent';
      return null;
    }
    const best={};
    Object.keys(DATA.rollups).forEach(tid=>{
      (DATA.rollups[tid].prs_window||[]).forEach(rec=>{
        const k=catKey(rec); if(!k)return;
        const n=recNum(rec);
        if(!best[k]||n>best[k]._n) best[k]={rec,type:tid,_n:n};
      });
    });
    let any=false;
    CATS.forEach(([k,label])=>{
      const b=best[k]; if(!b)return; any=true;
      const t=typeById[b.type]||{accent:'#3b82f6',glyph:'?'}, rec=b.rec;
      const a=el('a','pr-cell'); a.href=logHref(rec.filename);
      a.style.setProperty('--type-accent',t.accent);
      a.innerHTML=`<div class="pr-top"><span class="pr-label">${label}</span><span class="pr-badge">${escapeHtml(t.glyph)}</span></div>
        <div class="pr-val">${recVal(rec)}</div>
        <div class="pr-meta"><span class="pr-ride">${escapeHtml(rec.name)}</span><span class="pr-date">${fmtDateShort(rec.date)}</span></div>`;
      host.appendChild(a);
    });
    if(!any) $('#recent-section').style.display='none';
  }

  function recRowsCompact(list){
    return (list||[]).map(rec=>`<a class="rec-row" href="${logHref(rec.filename)}"><span class="rec-label">${escapeHtml(rec.label)}</span><span class="rec-val">${recVal(rec)}</span></a>`).join('') || '<div class="rec-row" style="color:var(--text-faint)">— none —</div>';
  }
  function recRowsFull(list){
    return (list||[]).map(rec=>`<a class="rec-row" href="${logHref(rec.filename)}"><span class="rec-label">${escapeHtml(rec.label)}</span><span class="rec-val">${recVal(rec)}</span><span class="rec-ride">${escapeHtml(rec.name)}</span><span class="rec-date">${fmtDateShort(rec.date)}</span></a>`).join('') || '<div class="rec-row" style="color:var(--text-faint)">— none —</div>';
  }

  function daysAgo(iso){ if(!iso)return null; const d=new Date(iso+'T00:00:00'), now=new Date(DATA.today+'T00:00:00'); return Math.round((now-d)/86400000); }

  function renderActivityCards(){
    const host=$('#act-list');
    DATA.activities.forEach(t=>{
      const R=DATA.rollups[t.id]; if(!R) return;
      const card=el('div','act-card');
      card.style.setProperty('--type-accent',t.accent);
      card.style.setProperty('--type-accent-soft',hexA(t.accent,0.12));

      const PV = R.prev || {};
      const leadStat = t.isSnow
        ? `<span class="act-stat">Descent <b>${fmtElevSafe(R.elev_loss_m)} m</b>${miniDelta(R.elev_loss_m,PV.elev_loss_m)}</span>`
        : `<span class="act-stat">Distance <b>${fmtDist(R.distance_km)} km</b>${miniDelta(R.distance_km,PV.distance_km)}</span>`;
      const climbStat   = `<span class="act-stat">Climb <b>${fmtElevSafe(R.elev_gain_m)} m</b>${miniDelta(R.elev_gain_m,PV.elev_gain_m)}</span>`;
      const descentStat = `<span class="act-stat">Descent <b>${fmtElevSafe(R.elev_loss_m)} m</b>${miniDelta(R.elev_loss_m,PV.elev_loss_m)}</span>`;
      const ago=daysAgo(R.last_date);

      const head=el('div','act-card-head');
      head.innerHTML=`
        <span class="glyph-badge">${escapeHtml(t.glyph)}</span>
        <span class="act-head-label">${escapeHtml(t.label)}</span>
        <span class="act-head-stats">
          <span class="act-stat">Days <b>${R.days}</b>${miniDelta(R.days,PV.days)}</span>
          ${leadStat}${climbStat}${t.isSnow?'':descentStat}
          <span class="act-stat">Moving <b>${fmtHours(R.moving_h)}</b>${miniDelta(R.moving_h,PV.moving_h)}</span>
        </span>
        <span class="act-head-right">
          <span class="act-ago">${ago==null?'—':ago+'d ago'}</span>
          <span class="caret">&#9656;</span>
        </span>`;
      card.appendChild(head);

      const body=el('div','act-body');
      const grid=el('div','act-body-grid');

      const left=el('div');
      left.innerHTML=`<div class="eyebrow body-section-label">Year over year</div>`;
      const chartHost=el('div','chart-wrap');
      const chartDiv=el('div'); const ttDiv=el('div','tooltip');
      chartHost.appendChild(chartDiv); chartHost.appendChild(ttDiv);
      left.appendChild(chartHost);
      const miniSwitch=el('div','segmented'); miniSwitch.style.marginTop='12px';
      grid.appendChild(left);

      const avg = R.avg_speed_kmh==null ? '—' : `${fmtSpeed(R.avg_speed_kmh)}<span class="sp-unit">km/h</span>`;
      const top = R.max_speed_kmh==null ? '—' : `${fmtSpeed(R.max_speed_kmh)}<span class="sp-unit">km/h</span>`;
      const right=el('div');
      right.innerHTML=`
        <div class="speed-pair">
          <div><div class="eyebrow">Avg speed</div><div class="sp-val">${avg}</div></div>
          <div><div class="eyebrow">Top speed</div><div class="sp-val">${top}</div></div>
        </div>
        <div class="rec-twin">
          <div><div class="eyebrow col-label">Last 365 days</div><div class="rec-list">${recRowsCompact(R.prs_window)}</div></div>
          <div><div class="eyebrow col-label all">All time</div><div class="rec-list">${recRowsCompact(R.prs)}</div></div>
        </div>`;
      grid.appendChild(right);
      body.appendChild(grid);

      const foot=el('div','act-footer');
      foot.innerHTML=`<a class="foot-link" href="/logs?type=${encodeURIComponent(t.id)}">View all rides &rarr;</a>
        <a class="foot-link" href="/training">HR &amp; load &rarr;</a>`;
      body.appendChild(foot);
      card.appendChild(body);
      host.appendChild(card);

      // Per-type chart with its own metric switch (from server-provided chartMetrics).
      const defaultMetric = t.isSnow ? 'descent' : 'distance';
      const cState={metric:defaultMetric, years:YEARS.slice(-3)};
      const getSeries=(metric,year)=>{ const yr=(DATA.history[t.id]||{})[String(year)]; return yr?yr[metric]:null; };
      const tChart=makeChart(chartDiv, ttDiv, getSeries, cState);
      (t.chartMetrics||CROSS_METRICS.map(k=>({key:k,label:METRIC_DEFS[k].label}))).forEach(cm=>{
        const b=el('button',cm.key===cState.metric?'on':'',cm.label);
        b.addEventListener('click',ev=>{ ev.stopPropagation(); cState.metric=cm.key; [...miniSwitch.children].forEach(c=>c.classList.remove('on')); b.classList.add('on'); tChart.render(); });
        miniSwitch.appendChild(b);
      });
      left.insertBefore(miniSwitch, chartHost);

      let rendered=false;
      head.addEventListener('click',()=>{
        const opening=!card.classList.contains('open');
        card.classList.toggle('open');
        if(opening && !rendered){ tChart.render(); rendered=true; }
      });
    });
  }

  function renderRecordsTab(){
    const grid=$('#rec-grid');
    DATA.activities.forEach(t=>{
      const R=DATA.rollups[t.id]; if(!R) return;
      const card=el('div','rec-type-card');
      card.style.setProperty('--type-accent',t.accent);
      card.style.setProperty('--type-accent-soft',hexA(t.accent,0.12));
      card.innerHTML=`
        <div class="rec-type-head"><span class="rt-glyph">${escapeHtml(t.glyph)}</span><span class="rt-label">${escapeHtml(t.label)}</span></div>
        <div class="rec-cols">
          <div class="rec-col"><div class="eyebrow col-label">Last 365 days</div><div class="rec-list">${recRowsFull(R.prs_window)}</div></div>
          <div class="rec-col"><div class="eyebrow col-label all">All time</div><div class="rec-list">${recRowsFull(R.prs)}</div></div>
        </div>`;
      grid.appendChild(card);
    });
  }

  function bindTabs(){
    const bar=$('#tab-bar');
    bar.addEventListener('click',e=>{
      const btn=e.target.closest('.tab-btn'); if(!btn)return;
      [...bar.children].forEach(b=>b.classList.toggle('on',b===btn));
      const tab=btn.dataset.tab;
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('on',p.dataset.panel===tab));
    });
  }

  function renderEmpty(){
    $('#dash-root').innerHTML=`
      <div class="dash-empty">
        <h2>No rides yet</h2>
        <p>Connect Strava to import your activities, then your stats, maps and trails
           will show up here. New here? The guide walks you through it in about five minutes.</p>
        <div class="cta-row">
          <a class="btn primary" href="/setup?tab=sync">Connect Strava</a>
          <a class="btn secondary" href="/guide">Open the guide</a>
        </div>
      </div>`;
  }
  function showError(){
    $('#dash-root').innerHTML='<div class="dash-loading">Couldn’t load the dashboard. Try refreshing.</div>';
  }

  async function init(){
    let r;
    try{ r=await fetch('/api/summary?days=365&units=metric'); }catch(e){ showError(); return; }
    if(!r.ok){ showError(); return; }
    DATA=await r.json();
    typeById=Object.fromEntries((DATA.activities||[]).map(t=>[t.id,t]));
    YEARS=(DATA.years||[]).slice();
    CUR_YEAR=YEARS.length?Math.max(...YEARS):new Date().getFullYear();
    if(!DATA.activities || !DATA.activities.length){ renderEmpty(); return; }
    HISTORY_ALL=buildHistoryAll();
    $('#dash-root').innerHTML=shell();
    renderWindowRange();
    renderHero();
    renderRibbon();
    renderCrossChart();
    renderRecentStrip();
    bindTabs();
    renderActivityCards();
    renderRecordsTab();
  }

  init();
})();
</script>
</body>
</html>
