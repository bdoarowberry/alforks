<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HR debug — {{ date_str }}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <style>
    body { background: #0e1117; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 24px; }
    h1 { font-size: 1.1rem; font-weight: 500; margin: 0 0 8px; }
    .meta { font-size: 0.8rem; color: #aaa; margin-bottom: 18px; }
    .meta strong { color: #fff; }
    #wrap { background: #12151a; border: 1px solid #2a2d35; border-radius: 6px; padding: 16px; height: 460px; }
  </style>
</head>
<body>
  <h1>Heart rate — {{ date_str }}</h1>
  <div class="meta">
    Samples: <strong>{{ total }}</strong> ·
    Resting: <strong>{{ resting or '—' }}</strong> ·
    Day min: <strong>{{ min_day or '—' }}</strong> ·
    Day max: <strong>{{ max_day or '—' }}</strong>
  </div>
  <div id="wrap"><canvas id="chart"></canvas></div>
  <script>
    const samples = {{ samples | safe }};
    const data = samples.map(([ms, bpm]) => ({ x: ms, y: bpm }));
    new Chart(document.getElementById('chart'), {
      type: 'line',
      data: { datasets: [{ data, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)',
                           fill: true, borderWidth: 1.5, pointRadius: 0, tension: 0.15, spanGaps: false }] },
      options: {
        animation: false, responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
        scales: {
          x: { type: 'time', time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
               ticks: { color: '#ccc' }, grid: { color: '#1e2128' },
               title: { display: true, text: 'Time of day (local)', color: '#ccc' } },
          y: { ticks: { color: '#ccc' }, grid: { color: '#1e2128' },
               title: { display: true, text: 'HR (bpm)', color: '#ccc' } },
        },
      },
    });
  </script>
</body>
</html>
